<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe Premiere Pro - Password & Download</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- GLOBAL STYLES & GLASSMORPHISM --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-user-drag: none; }

        /* TEXT SELECTION & DRAG BLOCKED GLOBALLY */
        body {
            background: #0a0a1a; /* Updated to solid dark base for animations */
            background-attachment: fixed; color: white; min-height: 100vh; overflow-x: hidden;
            -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            position: relative; 
        }

        /* --- NEW ANIMATED BACKGROUND STYLES --- */
        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1; overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out alternate;
        }
        .orb-1 {
            width: 450px; height: 450px; background: #ff00cc;
            top: -10%; left: -10%; animation-duration: 25s;
        }
        .orb-2 {
            width: 550px; height: 550px; background: #333399;
            bottom: -20%; right: -10%; animation-duration: 22s; animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(50px, 50px) scale(1.05); }
        }
        /* -------------------------------------- */

        a, img { -webkit-user-drag: none; -khtml-user-drag: none; -moz-user-drag: none; -o-user-drag: none; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* --- SOFTWARE CARD --- */
        .software-card { 
            padding: 40px; display: flex; flex-direction: column; align-items: center; 
            text-align: center; width: 90%; max-width: 400px; position: relative;
            animation: searchPop 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
            z-index: 10;
        }

        @keyframes searchPop {
            0% { opacity: 0; transform: translateY(30px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* GLOWING LOGO EFFECT */
        .software-logo { 
            width: 100px; height: 100px; margin-bottom: 20px; border-radius: 20px; 
            animation: logoPulse 5s infinite alternate ease-in-out; 
        }
        @keyframes logoPulse {
            0% { filter: drop-shadow(0 0 10px #00d2ff) drop-shadow(0 0 20px #ff00ff); }
            33% { filter: drop-shadow(0 0 15px #ff00ff) drop-shadow(0 0 25px #00ffcc); }
            66% { filter: drop-shadow(0 0 10px #00ffcc) drop-shadow(0 0 30px #ffff00); }
            100% { filter: drop-shadow(0 0 10px #00d2ff) drop-shadow(0 0 20px #ff00ff); }
        }

        .software-title { font-size: 24px; font-weight: 600; margin-bottom: 5px; color: #fff; }
        .year-text { color: #00d2ff; }

        /* --- PASSWORD BOX (SELECTABLE) --- */
        .password-box {
            background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(0, 255, 0, 0.4);
            padding: 20px 40px; border-radius: 12px; margin-top: 25px; width: 100%;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }
        
        .password-label {
            font-size: 14px; color: #ccc; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;
        }

        /* Yahan par user-select ko override kiya gaya hai taki copy ho sake */
        .selectable-password {
            font-size: 32px; font-weight: 700; color: #00ff00; letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            -webkit-user-select: text !important; -moz-user-select: text !important; 
            -ms-user-select: text !important; user-select: text !important;
            cursor: text;
        }

        /* --- NEW DOWNLOAD BUTTON --- */
        .btn-download {
            width: 100%; padding: 15px; border-radius: 10px; border: none; font-size: 16px; font-weight: 600;
            color: white; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center;
            gap: 10px; position: relative; overflow: hidden; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
        }
        .btn-download:hover { 
            transform: scale(1.05) translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5); 
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* Shining effect animation */
        .btn-download::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); animation: slideLight 4s infinite linear;
        }
        @keyframes slideLight { 0% { left: -100%; } 100% { left: 200%; } }

        /* --- FLOATING ICONS --- */
        .floating-social { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 1000; }
        .floating-social a {
            width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; text-decoration: none; transition: 0.3s;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 25px rgba(0,0,0,0.6);
        }
        .floating-social a:hover { transform: scale(1.1); box-shadow: 0 15px 30px rgba(0,0,0,0.8); }
        .whatsapp { color: #25D366; text-shadow: 0 0 10px rgba(37, 211, 102, 0.5); }
        .telegram { color: #0088cc; text-shadow: 0 0 10px rgba(0, 136, 204, 0.5); }
    </style>
</head>
<body>

    <div class="bg-animation">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="software-card glass-panel">
        <img src="premiere-pro-logo.svg" alt="Premiere Pro Logo" class="software-logo">
        <div class="software-title">Adobe Premiere Pro <span class="year-text">2023</span></div>
        
        <div class="password-box">
            <span class="password-label">Password</span>
            <span class="selectable-password">639850</span>
        </div>

        <a href="https://youtu.be/r0xUNeNR_V0?si=LQ1bzPDkE36BEf6t" target="_blank" class="btn-download">
            <i class="fa-solid fa-download"></i> Download
        </a>
    </div>

    <div class="floating-social">
        <a href="https://wa.me/message/MTTGHMIF7TNSC1" target="_blank" class="whatsapp"><i class="fa-brands fa-whatsapp"></i></a>
        <a href="https://t.me/Its_Maxado" target="_blank" class="telegram"><i class="fa-brands fa-telegram"></i></a>
    </div>

    <script>
        // --- CELEBRATION ANIMATION (BOTTOM TO TOP BURST) ---
        window.addEventListener('load', function() {
            // Setup for the burst
            const defaults = { 
                startVelocity: 65, // Speed to shoot upwards
                spread: 90,        // How wide it spreads
                ticks: 200,        // How long particles last before disappearing (creates the 1-2 sec fall)
                zIndex: 100,
                colors: ['#00ff00', '#00d2ff', '#ff00ff', '#ffff00']
            };

            // Fire 3 quick bursts from the bottom instantly
            // 1. Bottom Left
            confetti(Object.assign({}, defaults, { particleCount: 60, angle: 60, origin: { x: 0, y: 1 } }));
            // 2. Bottom Right
            confetti(Object.assign({}, defaults, { particleCount: 60, angle: 120, origin: { x: 1, y: 1 } }));
            // 3. Bottom Center (Shoots straight up and falls over the card)
            confetti(Object.assign({}, defaults, { particleCount: 100, angle: 90, startVelocity: 85, spread: 120, origin: { x: 0.5, y: 1 } }));
        });

        // --- ANTI-INSPECT & ANTI-DRAG SYSTEM ---
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('dragstart', event => event.preventDefault()); 
        
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; // F12
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
        }
    </script>
</body>
</html>
