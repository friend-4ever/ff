<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Software Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === GLOBAL STYLES & APPLE LIQUID GLASS THEME === */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
            user-select: none; /* Prevent text selection */
        }
        body {
            background: radial-gradient(circle top right, #1c1c28, #0a0a0f);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }
        
        /* Transparent Glass Effect */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }

        /* === TOP NAVIGATION === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-radius: 0 0 20px 20px;
            border-top: none;
        }
        .os-tag { display: flex; align-items: center; gap: 8px; font-weight: 500; font-size: 1.1rem;}
        .apple-link { color: #fff; font-size: 1.5rem; transition: 0.3s; cursor: pointer; }
        .apple-link:hover { color: #ccc; transform: scale(1.1); }

        /* === MAIN HEADINGS === */
        .hero { text-align: center; padding: 40px 20px 20px; }
        .hero h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(90deg, #ff8a00, #e52e71); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero p { font-size: 1.1rem; color: #bbb; margin-top: 10px; }

        /* === SEARCH BAR === */
        .search-container {
            display: flex; justify-content: center; margin: 20px auto 40px; padding: 0 20px;
        }
        .search-box {
            width: 100%; max-width: 500px; padding: 15px 25px; border-radius: 30px;
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; font-size: 1rem; outline: none; transition: 0.3s;
        }
        .search-box:focus { background: rgba(255, 255, 255, 0.15); border-color: #00d26a; }
        .error-msg { text-align: center; color: #ff4757; display: none; margin-top: -20px; margin-bottom: 20px; font-weight: 600;}

        /* === BUNDLE PLAN SECTION === */
        .bundle-wrapper {
            padding: 4px;
            border-radius: 24px;
            background: linear-gradient(90deg, #ff007f, #7f00ff, #00d2ff, #ff007f);
            background-size: 400%;
            animation: neonSlide 10s linear infinite;
            margin: 0 auto 50px;
            max-width: 900px;
            width: 90%;
        }
        @keyframes neonSlide { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .bundle-content { padding: 30px; text-align: center; border-radius: 20px; background: #0f0f14;}
        .bundle-content h2 { color: #fff; font-size: 1.5rem; margin-bottom: 20px;}
        .bundle-logos { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 25px;}
        .bundle-logos img { 
            width: 40px; height: 40px; border-radius: 8px;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.4));
        }
        .btn-blue {
            background: #007bff; color: #fff; padding: 12px 30px; border: none;
            border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 1.1rem;
            transition: 0.3s; box-shadow: 0 0 15px rgba(0, 123, 255, 0.5);
        }
        .btn-blue:hover { transform: translateY(-3px); box-shadow: 0 0 25px rgba(0, 123, 255, 0.8); }

        /* === SOFTWARE GRID === */
        .software-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px; padding: 0 5%; max-width: 1400px; margin: auto;
        }
        .software-card {
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            transition: transform 0.3s;
        }
        .software-card:hover { transform: translateY(-5px); }
        .card-header { display: flex; align-items: center; justify-content: space-between; }
        .logo-title { display: flex; align-items: center; gap: 12px; flex: 1; }
        .logo-title img { width: 45px; height: 45px; border-radius: 10px; object-fit: contain; }
        .title-box { display: flex; flex-direction: column; }
        .software-name { font-weight: 600; font-size: 1.1rem; }
        .software-price { font-size: 0.9rem; color: #aaa; margin-top: 2px;}
        
        .version-select {
            background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2);
            padding: 5px 10px; border-radius: 8px; outline: none; cursor: pointer;
        }

        /* === BUTTONS === */
        .action-btns { display: flex; flex-direction: column; gap: 10px; margin-top: auto;}
        .btn {
            padding: 12px; border: none; border-radius: 12px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; transition: 0.3s; color: #fff; text-decoration: none; font-size: 0.95rem;
        }
        .btn-download { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); }
        .btn-download:hover { background: rgba(255, 255, 255, 0.2); }
        
        .btn-password {
            background: #00d26a; color: #000; position: relative; overflow: hidden;
            box-shadow: 0 0 15px rgba(0, 210, 106, 0.4);
        }
        /* Green sliding light reflect effect */
        .btn-password::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            transform: skewX(-20deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        
        .btn-video { background: rgba(255, 0, 85, 0.8); }
        .btn-video:hover { background: rgba(255, 0, 85, 1); box-shadow: 0 0 15px rgba(255,0,85,0.5);}

        .btn-canva { background: linear-gradient(90deg, #00c4cc, #7d2ae8); font-size: 0.85rem;}

        /* === FLOATING SOCIALS === */
        .social-float {
            position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 15px; z-index: 1000;
        }
        .social-btn {
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff; text-decoration: none; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .social-btn.whatsapp { background: #25D366; }
        .social-btn.telegram { background: #0088cc; }
        .social-btn:hover { transform: scale(1.1); }

        /* === VIDEO POPUP MODAL === */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .modal-content {
            width: 90%; max-width: 800px; aspect-ratio: 16/9; background: #000;
            border-radius: 12px; overflow: hidden; border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        .modal-content iframe { width: 100%; height: 100%; border: none; }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
            .software-card { padding: 15px; }
            .bundle-wrapper { width: 95%; }
        }
    </style>
</head>

        // Update Links dynamically when version dropdown changes
        window.updateLinks = function(id, version, name) {
            document.getElementById(`title-${id}`).innerText = `${name} ${version}`;

            if(sw && sw.links[version]) {

        const iframe = document.getElementById('videoIframe');

            modal.style.display = "flex";

        // Close modal when clicking outside (on the overlay)
        modal.addEventListener('click', function() {
            modal.style.display = "none";
            iframe.src = ""; // Stop video audio playing in background

        // Fuzzy Search Logic
        window.searchSoftware = function() {
            let input = document.getElementById('searchInput').value.toLowerCase().replace(/\s/g, '');
            let cards = document.querySelectorAll('.software-card');
            let bundle = document.getElementById('bundleSection');
            let errorMsg = document.getElementById('errorMsg');
            let found = false;

            if(input.length > 0) {
                bundle.style.display = 'none'; // Hide bundle on search
            } else {
                bundle.style.display = 'block';
            }

            cards.forEach(card => {
                // remove spaces from card name to match fuzzy typing
                let name = card.getAttribute('data-name').replace(/\s/g, '');
                // Check if search text is part of the name
                if (name.includes(input) || input.includes(name)) {
                    card.style.display = 'flex';
                    found = true;
                } else {
                    card.style.display = 'none';
                }
            });

            // Show error if nothing found
            if(!found && input.length > 0) {
                errorMsg.style.display = 'block';
            } else {
                errorMsg.style.display = 'none';
            }
        }

        renderUI();
