    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        :root {
            --neon-cyan: #00f5ff;
            --neon-purple: #c026d3;
        }
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        /* Liquid Glass Theme */
        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .neon-glow {
            box-shadow: 0 0 15px var(--neon-cyan),
                        0 0 30px var(--neon-cyan),
                        0 0 50px rgba(0, 245, 255, 0.3);
        }
        
        .card-hover {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
        }
        
        /* Shine Animation for Buttons */
        .shine-btn {
            position: relative;
            overflow: hidden;
        }
        
        .shine-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -100%;
            width: 50%;
            height: 300%;
            background: linear-gradient(
                120deg,
                transparent,
                rgba(255, 255, 255, 0.4),
                transparent
            );
            animation: shine 4s infinite;
        }
        
        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }
        
        /* Neon Bundle Logos Animation */
        .bundle-logo {
            transition: all 0.3s ease;
        }
        
        .bundle-logo:hover {
            transform: scale(1.15) rotate(5deg);
            filter: drop-shadow(0 0 25px #00f5ff);
        }
        
        /* Version Selector */
        .version-btn {
            transition: all 0.3s ease;
        }
        
        .version-btn.active {
            background-color: #22c55e;
            color: white;
            box-shadow: 0 0 15px #22c55e;
        }
        
        /* Modal */
        .modal {
            animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes modalPop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        /* Search Input Glass */
        .search-glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
        }
        
        .software-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
        }
    </style>

                    const fullName = (soft.name + (soft.defaultVersion ? ' ' + soft.defaultVersion : '')).toLowerCase()

                renderSoftwareCards(filtered.length ? filtered : softwares)

        // Right Click Block + Dev Tools Block
        function blockInspect() {
            document.addEventListener('contextmenu', e => e.preventDefault())
            
            document.addEventListener('keydown', e => {
                if (e.key === "F12" || 
                    (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "C")) ||
                    (e.ctrlKey && e.key === "u")) {
                    e.preventDefault()
                }
            })
        }
