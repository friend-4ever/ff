<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS - Apple Liquid Glass Theme */
        :root {
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
            --highlight: #00f0ff;
            --pay-btn-glow: linear-gradient(45deg, #ff007a, #7a00ff);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a; /* Dark sleek background */
            background-image: radial-gradient(circle at top right, #1e3a8a 0%, transparent 40%),
                              radial-gradient(circle at bottom left, #4c1d95 0%, transparent 40%);
            color: var(--text-color);
            min-height: 100vh;
            background-attachment: fixed;
        }

        /* Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .os-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.2rem;
            color: #00a4ef; /* Windows Blue */
        }

        .search-container {
            flex-grow: 1;
            max-width: 500px;
            margin: 0 20px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .search-container input:focus {
            border-color: var(--highlight);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .apple-redirect {
            font-size: 1.5rem;
            color: white;
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .apple-redirect:hover {
            color: #a3aaae;
        }

        /* Top Highlight Banner */
        .highlight-banner {
            text-align: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 1.1rem;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--glass-border);
        }
        .highlight-banner span {
            color: var(--highlight);
            font-weight: bold;
        }

        /* Bundle Section */
        .bundle-section {
            margin: 40px auto;
            max-width: 1000px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 2px solid #00f0ff;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
        }

        .bundle-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .bundle-logos {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        .bundle-logos img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            animation: glow-color 3s infinite alternate;
        }

        @keyframes glow-color {
            0% { filter: drop-shadow(0 0 5px #ff007a); }
            50% { filter: drop-shadow(0 0 15px #00f0ff); }
            100% { filter: drop-shadow(0 0 5px #7a00ff); }
        }

        .btn-buy-bundle {
            background: #007bff;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.5);
            transition: 0.3s;
        }
        .btn-buy-bundle:hover {
            background: #0056b3;
            transform: scale(1.05);
        }

        /* Software Grid */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 30px;
            max-width: 1200px;
            margin: auto;
        }

        .software-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .software-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .software-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 15px;
            border-radius: 15px;
        }

        .software-name {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .price-tag {
            font-size: 1.2rem;
            color: var(--highlight);
            margin-bottom: 15px;
        }

        .discount-badge {
            font-size: 0.9rem;
            background: rgba(255, 0, 0, 0.2);
            color: #ff4d4d;
            padding: 3px 8px;
            border-radius: 10px;
            vertical-align: middle;
            margin-left: 5px;
        }

        select.version-selector {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: 1px solid var(--glass-border);
            outline: none;
            font-size: 1rem;
        }

        /* Action Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            box-sizing: border-box;
        }

        .btn-download {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
        }
        .btn-download:hover { background: rgba(255, 255, 255, 0.2); }

        .btn-pay {
            background: var(--pay-btn-glow);
            box-shadow: 0 0 15px rgba(255, 0, 122, 0.4);
            font-size: 1.1rem;
        }
        .btn-pay:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(255, 0, 122, 0.6);
        }

        .btn-video {
            background: transparent;
            border: 1px solid #00f0ff;
            color: #00f0ff;
        }
        .btn-video:hover {
            background: rgba(0, 240, 255, 0.1);
        }

        .canva-note {
            font-size: 0.8rem;
            color: #ccc;
            margin-top: -5px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        /* Floating Social Icons */
        .floating-social {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .floating-social a {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            color: white;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .whatsapp { background: #25D366; }
        .telegram { background: #0088cc; }
        .floating-social a:hover { transform: scale(1.1); }

        /* Video Popup */
        .video-popup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .video-popup-overlay.active {
            display: flex;
        }
        .video-container {
            width: 80%;
            max-width: 800px;
            height: 60vh;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
            pointer-events: auto; /* Allow interaction with video */
        }
        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>

                logo: "https://upload.wikimedia.org/wikipedia/commons/5/52/Adobe_Character_Animator_icon.svg",

        // ==========================================
        // UI RENDER AND LOGIC (Aapko isko edit karne ki jarurat nahi)
        // ==========================================
        const grid = document.getElementById('softwareGrid');
        const searchInput = document.getElementById('searchInput');

        function renderSoftware(data) {
            grid.innerHTML = '';
            data.forEach((sw, index) => {
                let initialVersion = sw.versions.length > 0 ? sw.versions[0] : '';
                let titleYear = initialVersion ? ` ${initialVersion}` : '';
                
                let versionHtml = '';
                if(sw.versions.length > 0) {
                    versionHtml = `<select class="version-selector" data-id="${sw.id}" onchange="updateCard('${sw.id}', this.value)">`;
                    sw.versions.forEach(v => {
                        versionHtml += `<option value="${v}">${v}</option>`;
                    });
                    versionHtml += `</select>`;
                }

                // Retrieve current links based on default version
                let curLinks = sw.versions.length > 0 ? sw.links[initialVersion] : sw.links["default"];
                let payText = sw.id === "canva" ? "Pay" : "Get Password (Pay)";
                let noteHtml = sw.note ? `<div class="canva-note">${sw.note}</div>` : '';

                let cardHtml = `
                    <div class="software-card" id="card_${sw.id}">
                        <img src="${sw.logo}" alt="${sw.name}" class="software-logo">
                        <div class="software-name" id="title_${sw.id}">${sw.name}<span id="year_${sw.id}">${titleYear}</span></div>
                        
                        <div class="price-tag">
                            ₹${sw.price} <span class="discount-badge">99% OFF</span>
                        </div>
                        
                        ${versionHtml}
                        ${noteHtml}
                        
                        <a href="${curLinks.down || '#'}" id="btn_down_${sw.id}" class="btn btn-download" target="_blank">Download</a>
                        <a href="${curLinks.pay || '#'}" id="btn_pay_${sw.id}" class="btn btn-pay" target="_blank">${payText}</a>
                        <button onclick="playVideo('${curLinks.vid}')" id="btn_vid_${sw.id}" class="btn btn-video">Installation steps + proof video</button>
                    </div>
                `;
                grid.innerHTML += cardHtml;
            });
        }

        // Dropdown change logic
        function updateCard(id, selectedVersion) {
            // Update the title year
            document.getElementById(`year_${id}`).innerText = ` ${selectedVersion}`;
            
            // Find software data
            let sw = db.find(item => item.id === id);
            let links = sw.links[selectedVersion];

            // Update button links dynamically
            document.getElementById(`btn_down_${id}`).href = links.down || '#';
            document.getElementById(`btn_pay_${id}`).href = links.pay || '#';
            // Video is handled via onclick attribute, we update the event listener or attribute
            document.getElementById(`btn_vid_${id}`).setAttribute('onclick', `playVideo('${links.vid}')`);
        }

        // Initial Render
        renderSoftware(db);

        // Search Logic (Intelligent filtering + Year selection)
        searchInput.addEventListener('input', (e) => {
            let query = e.target.value.toLowerCase();
            
            // Look for a year in the search query (e.g., "2025")
            let yearMatch = query.match(/\b(202[1-6]|1[3-5]|45)\b/);
            let searchYear = yearMatch ? yearMatch[0] : null;

            // Filter the database based on name
            let filtered = db.filter(sw => sw.name.toLowerCase().includes(query.replace(searchYear, '').trim()));
            
            // Re-render
            renderSoftware(filtered);

            // If a year was typed, auto-select it in the dropdowns
            if(searchYear) {
                filtered.forEach(sw => {
                    let selectElement = document.querySelector(`#card_${sw.id} .version-selector`);
                    if(selectElement && sw.versions.includes(searchYear)) {
                        selectElement.value = searchYear;
                        updateCard(sw.id, searchYear);
                    }
                });
            }
        });

        // Video Popup Logic
        const popup = document.getElementById('videoPopup');
        const iframe = document.getElementById('videoIframe');

        function playVideo(videoUrl) {
            if(!videoUrl || videoUrl === 'undefined') {
                alert("Video link abhi add nahi kiya gaya hai.");
                return;
            }
            // Add Google Drive preview format if it's a view link
            let embedUrl = videoUrl.replace('/view', '/preview');
            iframe.src = embedUrl;
            popup.classList.add('active');
        }

        // Close on clicking ANYWHERE on the screen (as requested)
        popup.addEventListener('click', () => {
            popup.classList.remove('active');
            iframe.src = ""; // Stop video playback
        });
