<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Software Store</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ================= CSS START ================= */
        :root {
            --bg-dark: #050509;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --neon-blue: #007bff;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
        }

        .area{
            background: #000000;  
            background: -webkit-linear-gradient(to left, #0e1629, #000000);
            width: 100%;
            height:100vh;
            position: fixed;
            top: 0; left: 0; z-index: -1;
        }

        .circles{
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        .circles li{
            position: absolute;
            display: block;
            list-style: none;
            width: 20px; height: 20px;
            background: rgba(255, 255, 255, 0.1);
            animation: animate 25s linear infinite;
            bottom: -150px;
        }

        .circles li:nth-child(1){ left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .circles li:nth-child(2){ left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
        .circles li:nth-child(3){ left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .circles li:nth-child(4){ left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .circles li:nth-child(5){ left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
        .circles li:nth-child(6){ left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .circles li:nth-child(7){ left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
        .circles li:nth-child(8){ left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .circles li:nth-child(9){ left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
        .circles li:nth-child(10){ left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }

        @keyframes animate {
            0%{ transform: translateY(0) rotate(0deg); opacity: 1; border-radius: 0; }
            100%{ transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            position: fixed;
            top: 0; width: 100%;
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }

        .os-indicator {
            color: var(--neon-cyan);
            font-weight: bold;
            display: flex; align-items: center; gap: 8px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .search-container {
            position: relative;
            width: 40%;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            padding-right: 45px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: #fff;
            font-size: 16px;
            transition: 0.3s;
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.4);
        }

        .search-container i {
            position: absolute;
            right: 15px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .apple-link {
            color: var(--text-muted);
            font-size: 24px;
            transition: 0.3s;
        }

        .apple-link:hover {
            color: #fff;
            text-shadow: 0 0 10px #fff;
        }

        main {
            margin-top: 100px;
            padding: 20px 5%;
            padding-bottom: 100px;
        }

        .bundle-plan {
            border: 2px solid var(--neon-magenta);
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            margin-bottom: 40px;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
            animation: borderGlow 2s infinite alternate;
        }

        @keyframes borderGlow {
            from { box-shadow: 0 0 10px rgba(255, 0, 255, 0.2); }
            to { box-shadow: 0 0 25px rgba(255, 0, 255, 0.5); }
        }

        .bundle-plan h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 24px;
            text-transform: uppercase;
        }

        .bundle-logos {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }

        .bundle-logo-img {
            height: 40px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5));
            transition: 0.3s;
            animation: logoPulse 1.5s infinite alternate;
        }

        .bundle-logo-img:hover {
            transform: scale(1.1);
        }

        @keyframes logoPulse {
            from { filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.5)); }
            to { filter: drop-shadow(0 0 12px var(--neon-cyan)); }
        }

        .btn-bundle {
            display: inline-block;
            padding: 12px 30px;
            background: var(--neon-blue);
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 123, 255, 0.5);
        }

        .btn-bundle:hover {
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.8);
            transform: translateY(-2px);
        }

        .software-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .software-card {
            position: relative;
            padding: 25px;
            transition: 0.4s ease;
            overflow: hidden;
        }

        .software-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .software-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            opacity: 0;
            transition: 0.4s;
            z-index: 0;
        }

        .software-card:hover::before {
            opacity: 1;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .software-logo-main {
            height: 35px;
            animation: logoPulse 1.5s infinite alternate;
        }

        .software-name-container {
            flex: 1;
            margin-left: 10px;
        }

        .software-name-title {
            font-size: 18px;
            font-weight: bold;
        }

        .version-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: #fff;
            border-radius: 5px;
            padding: 3px 5px;
            font-size: 12px;
            cursor: pointer;
        }

        .version-select:focus { outline: none; border-color: var(--neon-cyan); }

        .software-price {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .percent-off {
            color: #ff4444;
            font-weight: bold;
            display: block;
            font-size: 18px;
            margin-bottom: 10px;
        }

        .card-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-card {
            display: block;
            width: 100%;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .btn-download {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .btn-download:hover { background: rgba(255, 255, 255, 0.2); }

        .btn-pay-highlight {
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-magenta));
            color: #000;
            border: none;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            position: relative;
        }

        .btn-pay-highlight:hover {
            box-shadow: 0 0 25px rgba(255, 0, 255, 0.7);
            transform: scale(1.03);
        }

        .btn-pay-highlight small {
            font-weight: normal;
            font-size: 11px;
            opacity: 0.8;
        }

        .btn-proof {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-muted);
            cursor: pointer;
        }
        .btn-proof:hover {
            color: #fff;
            border-color: #fff;
        }

        .canva-card {
            border: 2px solid gold;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
        }

        .lifetime-tag {
            color: gold;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }

        .btn-info-special {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            font-size: 12px;
            margin-top: 15px;
            line-height: 1.4;
            cursor: default;
        }

        .floating-contact {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 200;
        }

        .floating-contact a {
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 28px;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .whatsapp-float { background: #25D366; }
        .telegram-float { background: #0088cc; }

        .floating-contact a:hover {
            transform: translateY(-5px) scale(1.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
        }

        .video-modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
            cursor: pointer;
        }

        .video-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            width: 80%;
            max-width: 900px;
            aspect-ratio: 16/9;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 255, 0.3);
            border: 2px solid var(--glass-border);
            cursor: default;
        }

        .modal-content iframe {
            width: 100%;
            height: 100%;
        }
        /* ================= CSS END ================= */
    </style>
</head>
<body>

    <div class="area" >
        <ul class="circles">
            <li></li><li></li><li></li><li></li><li></li>
            <li></li><li></li><li></li><li></li><li></li>
        </ul>
    </div >

    <header>
        <div class="os-indicator windows-active">
            <i class="fab fa-windows"></i> Windows Optimized
        </div>
        <div class="search-container">
            <input type="text" id="softwareSearch" placeholder="Search software...">
            <i class="fas fa-search"></i>
        </div>
        <a href="[[ADD_APPLE_SITE_LINK_HERE]]" class="os-redirect apple-link">
            <i class="fab fa-apple"></i>
        </a>
    </header>

    <main>
        <section class="bundle-plan">
            <h2>Buy Now! Bundle plans at Half Price – Only ₹395</h2>
            <div class="bundle-logos" id="bundleLogos"></div>
            <a href="[[ADD_BUNDLE_PAYMENT_LINK_HERE]]" class="btn-bundle">Buy Bundle Plans</a>
        </section>

        <div class="software-grid" id="softwareGrid">
            </div>
    </main>

    <div class="floating-contact">
        <a href="https://wa.me/message/MTTGHMIF7TNSC1" target="_blank" class="whatsapp-float">
            <i class="fab fa-whatsapp"></i>
        </a>
        <a href="https://t.me/Its_Maxado" target="_blank" class="telegram-float">
            <i class="fab fa-telegram-plane"></i>
        </a>
    </div>

    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <iframe id="videoPlayer" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>
    <script>
        // ================= JAVASCRIPT START =================
        const softwareData = [
            {
                id: "premiere", name: "Adobe Premiere Pro", basePrice: 99, percentOff: 99, hasVersions: true,
                versions: {
                    "2026": { download: "[[LINK_PP_2026_DL]]", pay: "[[LINK_PP_2026_PAY]]" },
                    "2025": { download: "[[LINK_PP_2025_DL]]", pay: "[[LINK_PP_2025_PAY]]" },
                    "2024": { download: "[[LINK_PP_2024_DL]]", pay: "[[LINK_PP_2024_PAY]]" },
                    "2023": { download: "[[LINK_PP_2023_DL]]", pay: "[[LINK_PP_2023_PAY]]" },
                    "2022": { download: "[[LINK_PP_2022_DL]]", pay: "[[LINK_PP_2022_PAY]]" },
                    "2021": { download: "[[LINK_PP_2021_DL]]", pay: "[[LINK_PP_2021_PAY]]" }
                },
                defaultVersion: "2026", logo: "https://www.adobe.com/content/dam/cc/icons/premierepro.svg"
            },
            {
                id: "ae", name: "Adobe After Effects", basePrice: 100, percentOff: 99, hasVersions: true,
                versions: {
                    "2026": { download: "[[LINK_AE_2026_DL]]", pay: "[[LINK_AE_2026_PAY]]" },
                    "2025": { download: "[[LINK_AE_2025_DL]]", pay: "[[LINK_AE_2025_PAY]]" }
                },
                defaultVersion: "2026", logo: "https://www.adobe.com/content/dam/cc/icons/aftereffects.svg"
            },
            {
                id: "ps", name: "Adobe Photoshop", basePrice: 98, percentOff: 99, hasVersions: true,
                versions: {
                    "2026": { download: "[[LINK_PS_2026_DL]]", pay: "[[LINK_PS_2026_PAY]]" }
                },
                defaultVersion: "2026", logo: "https://www.adobe.com/content/dam/cc/icons/photoshop.svg"
            },
            {
                id: "filmora", name: "Wondershare Filmora", basePrice: 96, percentOff: 99, hasVersions: true,
                versions: {
                    "15": { download: "[[LINK_FILMORA_15_DL]]", pay: "[[LINK_FILMORA_15_PAY]]" },
                    "14": { download: "[[LINK_FILMORA_14_DL]]", pay: "[[LINK_FILMORA_14_PAY]]" },
                    "13": { download: "[[LINK_FILMORA_13_DL]]", pay: "[[LINK_FILMORA_13_PAY]]" }
                },
                defaultVersion: "15", logo: "https://images.wondershare.com/filmora/wondershare-filmora-logo.png"
            },
            {
                id: "canva", name: "Canva Pro", basePrice: 199, percentOff: 99, hasVersions: false, isCanvaSpec: true,
                download: "#", pay: "[[LINK_CANVA_PAY]]", logo: "https://upload.wikimedia.org/wikipedia/commons/0/08/Canva_icon_2021.svg"
            },
            { id: "enc", name: "Adobe Media Encoder", basePrice: 188, percentOff: 99, hasVersions: true, versions: {"2026":{download:"[[LINK_DL]]",pay:"[[LINK_PAY]]"}}, defaultVersion:"2026", logo:"https://www.adobe.com/content/dam/cc/icons/mediaencoder.svg"},
            { id: "aud", name: "Adobe Audition", basePrice: 77, percentOff: 99, hasVersions: true, versions: {"2026":{download:"[[LINK_DL]]",pay:"[[LINK_PAY]]"}}, defaultVersion:"2026", logo:"https://www.adobe.com/content/dam/cc/icons/audition.svg"},
            { id: "lr", name: "Adobe Lightroom", basePrice: 69, percentOff: 99, hasVersions: true, versions: {"2026":{download:"[[LINK_DL]]",pay:"[[LINK_PAY]]"}}, defaultVersion:"2026", logo:"https://www.adobe.com/content/dam/cc/icons/lightroom.svg"},
            { id: "ai", name: "Adobe Illustrator", basePrice: 89, percentOff: 99, hasVersions: true, versions: {"2026":{download:"[[LINK_DL]]",pay:"[[LINK_PAY]]"}}, defaultVersion:"2026", logo:"https://www.adobe.com/content/dam/cc/icons/illustrator.svg"},
            { id: "id", name: "Adobe InDesign", basePrice: 78, percentOff: 99, hasVersions: true, versions: {"2026":{download:"[[LINK_DL]]",pay:"[[LINK_PAY]]"}}, defaultVersion:"2026", logo:"https://www.adobe.com/content/dam/cc/icons/indesign.svg"},
            { id: "an", name: "Adobe Animate", basePrice: 84, percentOff: 99, hasVersions: true, versions: {"2026":{download:"[[LINK_DL]]",pay:"[[LINK_PAY]]"}}, defaultVersion:"2026", logo:"https://www.adobe.com/content/dam/cc/icons/animate.svg"},
            { id: "cha", name: "Adobe Character Animator", basePrice: 83, percentOff: 99, hasVersions: true, versions: {"2026":{download:"[[LINK_DL]]",pay:"[[LINK_PAY]]"}}, defaultVersion:"2026", logo:"https://www.adobe.com/content/dam/cc/icons/characteranimator.svg"}
        ];

        const GOOGLE_DRIVE_VIDEO_EMBED = "https://drive.google.com/file/d/1eRc7C8OLn8G9_vUHfZdj6GYnmGOhiZlL/preview";
        const gridEl = document.getElementById('softwareGrid');
        const searchEl = document.getElementById('softwareSearch');
        const bundleLogosEl = document.getElementById('bundleLogos');
        const modalEl = document.getElementById('videoModal');
        const videoPlayerEl = document.getElementById('videoPlayer');

        window.onload = function() {
            loadBundleLogos();
            renderCards(softwareData);
        };

        function loadBundleLogos() {
            const logos = [
                softwareData[0].logo, softwareData[1].logo, softwareData[2].logo, 
                softwareData[3].logo, softwareData[5].logo, softwareData[6].logo,
                softwareData[7].logo, softwareData[8].logo, softwareData[9].logo, 
                softwareData[10].logo
            ];
            logos.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                img.className = 'bundle-logo-img';
                img.onerror = () => img.style.display = 'none';
                bundleLogosEl.appendChild(img);
            });
        }

        function renderCards(data) {
            gridEl.innerHTML = '';
            data.forEach(sw => {
                const card = document.createElement('div');
                card.className = `glass software-card ${sw.isCanvaSpec ? 'canva-card' : ''}`;
                card.id = `card-${sw.id}`;

                let versionHtml = '';
                if(sw.hasVersions) {
                    versionHtml = `<select class="version-select" onchange="changeVersion('${sw.id}', this.value)">`;
                    for (const ver in sw.versions) {
                        versionHtml += `<option value="${ver}" ${ver === sw.defaultVersion ? 'selected' : ''}>${ver}</option>`;
                    }
                    versionHtml += `</select>`;
                } else if (sw.isCanvaSpec) {
                    versionHtml = `<span class="lifetime-tag">LIFETIME</span>`;
                }

                const currentLinks = sw.hasVersions ? sw.versions[sw.defaultVersion] : sw;

                card.innerHTML = `
                    <div class="card-content">
                        <div class="card-header">
                            <img src="${sw.logo}" alt="${sw.name}" class="software-logo-main" onerror="this.style.display='none'">
                            <div class="software-name-container">
                                <div class="software-name-title" id="title-${sw.id}">
                                    ${sw.name} ${sw.hasVersions ? sw.defaultVersion : ''}
                                </div>
                            </div>
                            ${versionHtml}
                        </div>
                        
                        <div class="percent-off">${sw.percentOff}% OFF Mention</div>
                        <div class="software-price">(Price ₹${sw.basePrice})</div>

                        <div class="card-buttons">
                            ${!sw.isCanvaSpec ? 
                                `<a href="${currentLinks.download}" class="btn-card btn-download" id="dl-${sw.id}">Download</a>` 
                                : ''
                            }
                            
                            <a href="${currentLinks.pay}" class="btn-card btn-pay-highlight" id="pay-${sw.id}">
                                ${sw.isCanvaSpec ? 'Sir pay' : `Get Password <small>(Pay)</small>`}
                            </a>

                            <button class="btn-card btn-proof" onclick="openVideoPopup()">installation steps + proof video</button>
                            
                            ${sw.isCanvaSpec ? 
                                `<div class="btn-card btn-info-special">Pay kro & WhatsApp ya telegram me screenshot do. (Email Login) Android iOS windows MacOS all device supported</div>` 
                                : ''
                            }
                        </div>
                    </div>
                `;
                gridEl.appendChild(card);
            });
        }

        function changeVersion(swId, selectedVer) {
            const sw = softwareData.find(s => s.id === swId);
            if(!sw) return;
            document.getElementById(`title-${swId}`).innerText = `${sw.name} ${selectedVer}`;
            const newLinks = sw.versions[selectedVer];
            document.getElementById(`dl-${swId}`).href = newLinks.download;
            document.getElementById(`pay-${swId}`).href = newLinks.pay;
        }

        searchEl.addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase().trim();
            const match = term.match(/^([a-z\s]+)\s*(\d{4})?$/);
            let searchName = term;
            let searchYear = null;

            if(match) {
                searchName = match[1].trim();
                searchYear = match[2];
            }

            if(term === '') {
                renderCards(softwareData);
                return;
            }

            let filteredData = softwareData.filter(sw => sw.name.toLowerCase().includes(searchName));

            if(filteredData.length > 0) {
                renderCards(filteredData);
                if(searchYear) {
                    filteredData.forEach(sw => {
                        if(sw.hasVersions && sw.versions[searchYear]) {
                            const selectEl = document.querySelector(`#card-${sw.id} .version-select`);
                            if(selectEl) {
                                selectEl.value = searchYear;
                                changeVersion(sw.id, searchYear);
                            }
                        }
                    });
                }
            } else {
                gridEl.innerHTML = '<div class="no-results glass" style="padding: 20px; text-align: center;">No matching software found.</div>';
            }
        });

        function openVideoPopup() {
            videoPlayerEl.src = GOOGLE_DRIVE_VIDEO_EMBED;
            modalEl.classList.add('active');
        }

        function closeVideoPopup() {
            modalEl.classList.remove('active');
            videoPlayerEl.src = "";
        }

        modalEl.addEventListener('click', function(e) {
            if (e.target === modalEl) {
                closeVideoPopup();
            }
        });
        // ================= JAVASCRIPT END =================
    </script>
</body>
</html>
