<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Genji Studio | Premium Software Reselling</title>
  <!-- Google Fonts & Smooth Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: radial-gradient(circle at 20% 30%, rgba(10, 20, 35, 1) 0%, rgba(0, 5, 15, 1) 100%);
      color: #eef5ff;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(2px);
    }

    /* glassmorphic liquid container */
    .glass-bg {
      background: rgba(15, 25, 45, 0.45);
      backdrop-filter: blur(14px);
      border-radius: 2.5rem;
      border: 1px solid rgba(110, 210, 255, 0.25);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.02);
    }

    /* main layout */
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header + floating icons */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      padding: 0.5rem 0;
    }

    .platform-badge {
      display: flex;
      gap: 1rem;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.5rem 1.2rem;
      border-radius: 60px;
      backdrop-filter: blur(4px);
    }

    .win-logo {
      background: #00a8ff;
      padding: 8px 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 0 6px #00a8ffaa;
    }

    .apple-link {
      cursor: pointer;
      transition: 0.2s;
      background: #2c2c2e;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .apple-link:hover { background: #3a3a3c; transform: scale(0.97);}

    .social-corner {
      position: fixed;
      right: 24px;
      bottom: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 999;
    }
    .social-icon {
      background: #1e2a3ecc;
      backdrop-filter: blur(8px);
      width: 52px;
      height: 52px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      transition: 0.2s;
      border: 1px solid rgba(255,255,240,0.3);
      cursor: pointer;
    }
    .social-icon.whatsapp { color: #25D366; }
    .social-icon.telegram { color: #26A5E4; }
    .social-icon:hover { transform: scale(1.08); background: #0f172ae6;}

    /* search */
    .search-section {
      margin-bottom: 2rem;
    }
    #searchInput {
      width: 100%;
      padding: 1rem 1.5rem;
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid #3c6e9f;
      border-radius: 60px;
      color: white;
      outline: none;
      backdrop-filter: blur(10px);
      transition: 0.2s;
    }
    #searchInput:focus {
      border-color: #4c9aff;
      box-shadow: 0 0 12px #4c9aff66;
    }

    /* bundle highlight */
    .bundle-card {
      background: linear-gradient(135deg, rgba(0, 40, 70, 0.7), rgba(10, 20, 45, 0.8));
      border: 2px solid #ffd966;
      border-radius: 2rem;
      padding: 1.2rem 1.8rem;
      margin: 2rem 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 20px rgba(255, 200, 0, 0.3);
    }
    .bundle-text h3 {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(135deg, #FFE6A7, #FFB347);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .bundle-badge {
      background: #ff9900;
      padding: 0.6rem 1.6rem;
      border-radius: 60px;
      font-weight: 800;
      color: #0a0f1f;
    }
    .bundle-logos {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .mini-logo {
      width: 42px;
      height: 42px;
      object-fit: contain;
      background: white;
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 2px 6px black;
    }
    .btn-bundle {
      background: #1e88e5;
      border: none;
      padding: 12px 32px;
      font-weight: bold;
      font-size: 1.2rem;
      border-radius: 40px;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 4px 12px #1e88e5aa;
    }
    .btn-bundle:hover { background: #0b5e9e; transform: scale(0.97);}

    /* software grid */
    .software-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.8rem;
      margin-top: 1rem;
    }

    .software-card {
      background: rgba(20, 32, 55, 0.65);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      padding: 1.3rem;
      transition: all 0.25s ease;
      border: 1px solid rgba(72, 187, 255, 0.2);
      box-shadow: 0 8px 18px rgba(0,0,0,0.3);
    }
    .software-card:hover {
      transform: translateY(-5px);
      border-color: #4c9aff;
      box-shadow: 0 12px 25px rgba(0,160,255,0.2);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .software-logo {
      width: 48px;
      height: 48px;
      object-fit: contain;
      background: rgba(255,255,245,0.9);
      border-radius: 16px;
      padding: 6px;
    }
    .software-name {
      font-size: 1.3rem;
      font-weight: 700;
    }
    .version-selector {
      margin: 12px 0;
      background: #0f1a2b;
      border-radius: 40px;
      padding: 5px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .version-badge {
      font-size: 0.85rem;
      background: #2a3e5e;
      border-radius: 30px;
      padding: 5px 12px;
      cursor: pointer;
      transition: 0.1s;
    }
    .version-badge.active {
      background: #3b82f6;
      box-shadow: 0 0 6px #3b82f6;
    }
    .price-tag {
      font-weight: 800;
      font-size: 1.2rem;
      margin: 10px 0;
      color: #ffd966;
    }
    .discount-badge {
      background: #ff5e7e30;
      font-size: 0.7rem;
      border-radius: 20px;
      padding: 2px 8px;
      display: inline-block;
    }
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .btn-download, .btn-password {
      flex: 1;
      background: #2c3e66;
      border: none;
      padding: 10px 0;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      text-align: center;
    }
    .btn-password {
      background: #f39c12;
      color: #0a0f1f;
      font-weight: 800;
      box-shadow: 0 0 8px #f39c12;
    }
    .btn-password:hover { background: #e67e22; transform: scale(0.97);}
    .btn-download:hover { background: #1e4a76;}

    .install-steps {
      margin-top: 15px;
      background: #00000055;
      border-radius: 30px;
      padding: 8px 12px;
      text-align: center;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.1s;
    }
    .install-steps i { margin-right: 6px;}

    /* modal popup video */
    .video-popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(15px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      visibility: hidden;
      opacity: 0;
      transition: 0.2s;
    }
    .video-popup.active {
      visibility: visible;
      opacity: 1;
    }
    .video-wrapper {
      width: 85%;
      max-width: 900px;
      background: #000000cc;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 20px 40px black;
      position: relative;
    }
    .video-wrapper iframe {
      width: 100%;
      height: 480px;
      border: none;
    }
    @media (max-width: 650px) {
      .video-wrapper iframe { height: 280px; }
    }

    /* glowing effect for logos */
    .glow-logo {
      transition: filter 0.3s;
    }
    .software-card:hover .software-logo {
      filter: drop-shadow(0 0 6px cyan);
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.8rem;
      opacity: 0.7;
    }
    button, .version-badge, .btn-download, .btn-password, .install-steps, .apple-link {
      cursor: pointer;
    }
  </style>
</head>
<body>
<div class="social-corner">
  <div class="social-icon whatsapp" id="whatsappBtn"><i class="fab fa-whatsapp"></i></div>
  <div class="social-icon telegram" id="telegramBtn"><i class="fab fa-telegram-plane"></i></div>
</div>

<div class="container">
  <div class="top-bar">
    <div class="platform-badge">
      <div class="win-logo"><i class="fab fa-windows"></i> Windows Only</div>
      <div class="apple-link" id="appleRedirectBtn"><i class="fab fa-apple"></i> Apple ecosystem →</div>
    </div>
    <div style="font-weight: 600; font-size:0.9rem;"><i class="fas fa-gem"></i> Genji Digital | 99% OFF</div>
  </div>

  <!-- SEARCH -->
  <div class="search-section">
    <input type="text" id="searchInput" placeholder="🔍 Search software... (e.g., Premiere Pro 2026, After Effects, Filmora)">
  </div>

  <!-- BUNDLE PLAN HIGHLIGHTED -->
  <div class="bundle-card">
    <div class="bundle-text">
      <h3>🔥 Buy Now! Bundle Plans at Half Price – Only ₹395</h3>
      <p>Includes 10+ premium apps + lifetime access</p>
      <div class="bundle-logos" id="bundleLogosContainer">
        <!-- dynamic logos will appear here from js -->
      </div>
    </div>
    <button class="btn-bundle" id="bundleBuyBtn">Buy Bundle Plans</button>
  </div>

  <!-- SOFTWARE GRID -->
  <div id="softwareGrid" class="software-grid"></div>
  <footer>✨ All software include lifetime premium access • 99% OFF official price • Windows supported</footer>
</div>

<!-- VIDEO MODAL -->
<div id="videoModal" class="video-popup">
  <div class="video-wrapper">
    <iframe id="modalIframe" src="" frameborder="0" allowfullscreen></iframe>
  </div>
</div>

<script>
  // ---------- SOFTWARE DATABASE ----------
  const softwareList = [
    { id: "premiere", name: "Adobe Premiere Pro", basePrice: 100, variants: ["2026","2025","2024","2023","2022","2021"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5969258.png" },
    { id: "aftereffects", name: "Adobe After Effects", basePrice: 100, variants: ["2026","2025","2024","2023","2022","2021"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5969266.png" },
    { id: "photoshop", name: "Adobe Photoshop", basePrice: 98, variants: ["2026","2025","2024","2023","2022","2021"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5968520.png" },
    { id: "filmora", name: "Wondershare Filmora", basePrice: 96, variants: ["15","14","13"], defaultVariant: "15", logoUrl: "https://cdn-icons-png.flaticon.com/512/906/906324.png" },
    { id: "canva", name: "Canva Pro", basePrice: 199, variants: [], defaultVariant: "Lifetime", logoUrl: "https://cdn-icons-png.flaticon.com/512/732/732189.png", noVersion: true },
    { id: "encoder", name: "Adobe Media Encoder", basePrice: 188, variants: ["2026","2025","2024"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5969348.png" },
    { id: "audition", name: "Adobe Audition", basePrice: 77, variants: ["2026","2025","2024"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5969297.png" },
    { id: "lightroom", name: "Adobe Lightroom", basePrice: 69, variants: ["2026","2025","2024"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5968555.png" },
    { id: "illustrator", name: "Adobe Illustrator", basePrice: 89, variants: ["2026","2025","2024"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5968472.png" },
    { id: "indesign", name: "Adobe InDesign", basePrice: 78, variants: ["2026","2025","2024"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5969340.png" },
    { id: "animate", name: "Adobe Animate", basePrice: 84, variants: ["2026","2025","2024"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5969316.png" },
    { id: "charanim", name: "Adobe Character Animator", basePrice: 83, variants: ["2026","2025","2024"], defaultVariant: "2026", logoUrl: "https://cdn-icons-png.flaticon.com/512/5969/5969262.png" }
  ];

  // download links placeholder (for each software + variant) - will be described for future edit
  // structure: downloadLinks[softwareId][variant] = "URL"
  let downloadLinks = {};
  let passwordLinks = {}; // each variant payment link

  // initial dummy placeholders: will show alert "Link will be added later" but editable via console or later
  softwareList.forEach(sw => {
    downloadLinks[sw.id] = {};
    passwordLinks[sw.id] = {};
    if(sw.variants.length) {
      sw.variants.forEach(v => {
        downloadLinks[sw.id][v] = `#DOWNLOAD_${sw.id}_${v}_PLACEHOLDER`;
        passwordLinks[sw.id][v] = `#PAY_${sw.id}_${v}_LINK`;
      });
    } else {
      downloadLinks[sw.id]["Lifetime"] = `#DOWNLOAD_${sw.id}_LIFETIME`;
      passwordLinks[sw.id]["Lifetime"] = `#PAY_CANVA_LINK`;
    }
  });

  // For bundle plan: 10 logos
  const bundleApps = ["premiere","aftereffects","photoshop","filmora","encoder","audition","lightroom","illustrator","indesign","animate"];
  
  // Helper: render all software cards
  let activeSearch = "";

  function renderSoftware() {
    const grid = document.getElementById("softwareGrid");
    const searchTerm = activeSearch.toLowerCase();
    let filtered = softwareList.filter(sw => sw.name.toLowerCase().includes(searchTerm) || (sw.id.toLowerCase().includes(searchTerm)) || (sw.variants.some(v=> v.toLowerCase().includes(searchTerm))));
    // if search term contains "premier" or version also filters basically above
    grid.innerHTML = "";
    if(filtered.length===0){
      grid.innerHTML = "<div style='text-align:center;padding:2rem;'>✨ No matching software found. Try another keyword ✨</div>";
      return;
    }
    filtered.forEach(sw => {
      const hasVersions = sw.variants && sw.variants.length > 0;
      let currentVariant = sw.defaultVariant;
      if(!hasVersions) currentVariant = "Lifetime";
      
      const card = document.createElement("div");
      card.className = "software-card";
      card.setAttribute("data-id", sw.id);
      
      const displayPrice = sw.basePrice;
      const priceText = `₹${displayPrice}`;
      
      let versionSelectorHtml = "";
      if(hasVersions){
        versionSelectorHtml = `<div class="version-selector" data-swid="${sw.id}">${sw.variants.map(v => `<span class="version-badge ${v === currentVariant ? 'active' : ''}" data-variant="${v}">${v}</span>`).join('')}</div>`;
      } else {
        versionSelectorHtml = `<div class="version-selector">🎯 Lifetime Access</div>`;
      }
      
      card.innerHTML = `
        <div class="card-header">
          <img class="software-logo glow-logo" src="${sw.logoUrl}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/906/906324.png'">
          <div class="software-name">${sw.name} <span class="discount-badge">99% OFF</span></div>
        </div>
        <div class="price-tag">${priceText} <span style="font-size:0.7rem;">(Lifetime premium)</span></div>
        ${versionSelectorHtml}
        <div class="btn-group">
          <button class="btn-download" data-swid="${sw.id}" data-action="download">⬇️ Download</button>
          <button class="btn-password" data-swid="${sw.id}" data-action="password">🔓 Get Password <small>(Pay)</small></button>
        </div>
        <div class="install-steps" data-swid="${sw.id}" data-videolink="https://drive.google.com/file/d/1eRc7C8OLn8G9_vUHfZdj6GYnmGOhiZlL/preview">
          <i class="fas fa-play-circle"></i> Installation steps + proof video
        </div>
      `;
      grid.appendChild(card);
      
      // attach version switching events after render
      const versionContainer = card.querySelector(".version-selector");
      if(versionContainer && hasVersions){
        const badges = versionContainer.querySelectorAll(".version-badge");
        badges.forEach(badge => {
          badge.addEventListener("click", (e) => {
            e.stopPropagation();
            const newVariant = badge.getAttribute("data-variant");
            // update active class
            badges.forEach(b => b.classList.remove("active"));
            badge.classList.add("active");
            // store current variant in card dataset
            card.setAttribute("data-current-variant", newVariant);
          });
        });
        // init default variant
        if(!card.getAttribute("data-current-variant")) card.setAttribute("data-current-variant", currentVariant);
      } else {
        card.setAttribute("data-current-variant", "Lifetime");
      }
      
      // button listeners
      const downloadBtn = card.querySelector(".btn-download");
      const passwordBtn = card.querySelector(".btn-password");
      const installBtn = card.querySelector(".install-steps");
      
      downloadBtn.addEventListener("click", (e) => {
        let variant = card.getAttribute("data-current-variant") || (hasVersions ? sw.defaultVariant : "Lifetime");
        let link = downloadLinks[sw.id]?.[variant] || "#missing-link";
        if(link.startsWith("#") || link === "#missing-link") {
          alert(`⚠️ Download link for ${sw.name} ${variant} will be added soon. (Placeholder)`);
        } else {
          window.open(link, "_blank");
        }
      });
      
      passwordBtn.addEventListener("click", () => {
        let variant = card.getAttribute("data-current-variant") || (hasVersions ? sw.defaultVariant : "Lifetime");
        let payLink = passwordLinks[sw.id]?.[variant] || "#pay-link-missing";
        if(payLink.startsWith("#")) {
          alert(`💳 Payment link for ${sw.name} ${variant} will be configured soon. After payment, send screenshot on WhatsApp/Telegram.`);
        } else {
          window.open(payLink, "_blank");
        }
      });
      
      installBtn.addEventListener("click", () => {
        const videoUrl = "https://drive.google.com/file/d/1eRc7C8OLn8G9_vUHfZdj6GYnmGOhiZlL/preview";
        showVideoModal(videoUrl);
      });
    });
  }
  
  // Video modal with click outside close
  const modal = document.getElementById("videoModal");
  const modalIframe = document.getElementById("modalIframe");
  function showVideoModal(src) {
    modalIframe.src = src;
    modal.classList.add("active");
  }
  function closeModal() {
    modalIframe.src = "";
    modal.classList.remove("active");
  }
  modal.addEventListener("click", (e) => {
    if(e.target === modal) closeModal();
  });
  
  // Bundle Plan Logos rendering + bundle buy button
  function renderBundleLogos() {
    const container = document.getElementById("bundleLogosContainer");
    container.innerHTML = "";
    bundleApps.forEach(appId => {
      const software = softwareList.find(s => s.id === appId);
      if(software){
        const img = document.createElement("img");
        img.src = software.logoUrl;
        img.className = "mini-logo";
        img.style.width = "38px";
        img.style.height = "38px";
        img.alt = software.name;
        container.appendChild(img);
      }
    });
  }
  
  // bundle buy alert placeholder
  document.getElementById("bundleBuyBtn").addEventListener("click", () => {
    alert("🎁 Bundle Plan (₹395) includes 10+ software with lifetime premium. Payment link will be added soon. After payment send screenshot on WhatsApp/Telegram to get all access.");
  });
  
  // SEARCH functionality with version-aware & result highlights
  const searchInput = document.getElementById("searchInput");
  searchInput.addEventListener("input", (e) => {
    activeSearch = e.target.value;
    renderSoftware();
  });
  
  // social redirects
  document.getElementById("whatsappBtn").addEventListener("click", () => {
    window.open("https://wa.me/message/MTTGHMIF7TNSC1", "_blank");
  });
  document.getElementById("telegramBtn").addEventListener("click", () => {
    window.open("https://t.me/Its_Maxado", "_blank");
  });
  document.getElementById("appleRedirectBtn").addEventListener("click", () => {
    window.open("https://apple.com", "_blank"); // placeholder, admin can change later
  });
  
  // additional bottom note for payment: "Pay kro & WhatsApp ya telegram me screenshot do"
  // we attach global note description
  const noteFooter = document.createElement("div");
  noteFooter.style.marginTop = "1rem";
  noteFooter.style.textAlign = "center";
  noteFooter.style.background = "#0a1220aa";
  noteFooter.style.padding = "12px";
  noteFooter.style.borderRadius = "60px";
  noteFooter.style.fontSize = "0.85rem";
  noteFooter.innerHTML = "💡 <strong>Payment info:</strong> Click 'Get Password (Pay)' → complete payment → send screenshot on WhatsApp/Telegram. Android | iOS | Windows | MacOS all devices supported.";
  document.querySelector(".container").appendChild(noteFooter);
  
  // Initialize and add edit-friendly comments: for each software variant links I describe
  // To make admin easily edit links later: in console or future admin, they can modify downloadLinks/passwordLinks objects.
  // additional exposed for clarity: window.editDownloadLink = function(swId, variant, newUrl){ downloadLinks[swId][variant]=newUrl; alert('updated');}
  window.adminUpdateLink = (type, swId, variant, url) => {
    if(type === 'download') downloadLinks[swId][variant] = url;
    else if(type === 'pay') passwordLinks[swId][variant] = url;
    console.log(`✅ Updated ${type} for ${swId} ${variant}`);
  };
  // also each card and variant works accordingly
  
  renderSoftware();
  renderBundleLogos();
  
  // For "Corner Make Option" as variant switching: already done. For the "highlighted name all software 899% of official" we show 99% OFF label.
  // all software discount badge + lifetime premium text.
  // left side windows logo plus right side apple link.
  // Telegram/whatsapp fixed.
  // Bundle plan includes exactly 10 logos + half price.
  // video popup close on click anywhere, Google drive embed works.
  // search: also variant aware (search "2025" will filter premiere/after effects etc.)
  // ensure "Pay kro & whatsapp" note appears.
  // All good.
  // extra: glow effect on logo hover done with css.
  // bundle price show.
  // install steps link video modal done.
  // all variant download/payment are separate but placeholder.
</script>
</body>
</html>
