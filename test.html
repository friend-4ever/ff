<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mera Land 2026 🔥</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Arial', sans-serif;
    }
    .container {
      text-align: center;
      position: relative;
    }
    h1 {
      color: #ff00ff;
      text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff;
      margin-bottom: 20px;
      animation: glow 1.5s infinite alternate;
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #ff00ff; }
      to { text-shadow: 0 0 60px #00ffff, 0 0 80px #ff00ff; }
    }
    .land {
      width: 180px;
      height: 420px;
      position: relative;
      filter: drop-shadow(0 0 30px #ff00ff);
      animation: throb 1.2s infinite ease-in-out;
    }
    .shaft {
      width: 100px;
      height: 320px;
      background: linear-gradient(#ff3366, #ff6699);
      border-radius: 50px 50px 20px 20px;
      position: absolute;
      left: 40px;
      top: 80px;
      box-shadow: 0 0 40px #ff00ff inset;
    }
    .head {
      width: 110px;
      height: 90px;
      background: #ff6699;
      border-radius: 50%;
      position: absolute;
      left: 35px;
      top: 20px;
      box-shadow: 0 0 30px #ffff00;
    }
    .vein {
      position: absolute;
      width: 12px;
      height: 220px;
      background: rgba(255,255,255,0.4);
      left: 65px;
      top: 130px;
      border-radius: 50%;
      transform: rotate(12deg);
    }
    .balls {
      width: 160px;
      height: 90px;
      position: absolute;
      left: 10px;
      top: 340px;
      display: flex;
      gap: 20px;
    }
    .ball {
      width: 70px;
      height: 70px;
      background: #ff3366;
      border-radius: 50%;
      box-shadow: 0 0 25px #ff00ff;
    }
    .controls {
      margin-top: 40px;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }
    button {
      padding: 12px 24px;
      font-size: 18px;
      background: #00ffff;
      color: #000;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 20px #00ffff;
      transition: all 0.3s;
    }
    button:hover {
      transform: scale(1.1);
      background: #ff00ff;
      color: white;
    }
    .size-slider {
      width: 300px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>MERA LAND 2026 🔥</h1>
    
    <div class="land" id="land">
      <div class="shaft"></div>
      <div class="head"></div>
      <div class="vein"></div>
      <div class="balls">
        <div class="ball"></div>
        <div class="ball"></div>
      </div>
    </div>

    <div class="controls">
      <button onclick="throbSpeed(0.8)">Slow Throb</button>
      <button onclick="throbSpeed(1.8)">Fast Throb</button>
      <button onclick="changeColor()">Random Color</button>
      <button onclick="bigLand()">Bada Karo</button>
      <button onclick="smallLand()">Chhota Karo</button>
    </div>

    <input type="range" min="100" max="400" value="180" class="size-slider" id="size" oninput="resizeLand()">
  </div>

  <script>
    let speed = 1.2;
    const land = document.getElementById('land');

    function throbSpeed(s) {
      speed = s;
      land.style.animationDuration = speed + 's';
    }

    function changeColor() {
      const colors = ['#ff3366', '#00ffcc', '#ffff00', '#ff00ff', '#00ffff'];
      const random = colors[Math.floor(Math.random()*colors.length)];
      document.querySelector('.shaft').style.background = `linear-gradient(${random}, #ff99cc)`;
      document.querySelector('.head').style.background = random;
    }

    function bigLand() {
      land.style.transform = 'scale(1.4)';
      setTimeout(() => land.style.transform = 'scale(1)', 800);
    }

    function smallLand() {
      land.style.transform = 'scale(0.6)';
      setTimeout(() => land.style.transform = 'scale(1)', 800);
    }

    function resizeLand() {
      const size = document.getElementById('size').value;
      land.style.width = size + 'px';
      land.style.height = (size * 2.33) + 'px';
    }

    // Auto bounce on click
    land.addEventListener('click', () => {
      land.style.transform = 'scale(1.6) rotate(8deg)';
      setTimeout(() => land.style.transform = 'scale(1) rotate(0)', 400);
    });

    // Keyboard control (arrow up = bada, down = chhota)
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp') bigLand();
      if (e.key === 'ArrowDown') smallLand();
    });
  </script>
</body>
</html>
