<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Software Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #00ff66;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            user-select: none; /* Text selection disabled */
        }

        body {
            background: radial-gradient(circle at 50% 0%, #1e1b4b, #000000);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
        }

        /* Header / Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .os-indicators { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .os-indicators i.fa-windows { color: #00adef; font-size: 24px; }
        
        .search-container {
            flex-grow: 1;
            max-width: 500px;
            margin: 0 20px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-size: 16px;
            outline: none;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }
        .search-container input:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }

        .apple-link i { font-size: 24px; color: white; cursor: pointer; transition: 0.3s; }
        .apple-link i:hover { color: #a1a1aa; drop-shadow: 0 0 5px white; }

        /* Top Highlight Text */
        .highlight-text {
            text-align: center;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: 600;
            background: linear-gradient(90deg, #ff8a00, #e52e71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulseText 2s infinite alternate;
        }

        /* Bundle Section */
        .bundle-section {
            max-width: 900px;
            margin: 20px auto;
            padding: 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2), inset 0 0 20px rgba(188, 19, 254, 0.2);
            border: 2px solid;
            border-image: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)) 1;
        }
        
        .bundle-title { font-size: 1.5rem; margin-bottom: 20px; color: #fff; text-shadow: 0 0 10px var(--neon-blue); }
        
        .bundle-logos {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }

        .bundle-logos img {
            width: 40px;
            height: 40px;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
            animation: floatGlow 3s infinite alternate ease-in-out;
        }

        .btn-bundle {
            background: linear-gradient(45deg, #0051ff, #00d4ff);
            border: none;
            padding: 12px 30px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 81, 255, 0.5);
            transition: 0.3s;
        }
        .btn-bundle:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(0, 212, 255, 0.8); }

        /* Software Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px 40px;
            max-width: 1400px;
            margin: auto;
        }

        .software-card {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            transition: transform 0.3s;
        }
        .software-card:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.3); }

        .card-header { display: flex; align-items: center; gap: 15px; }
        .card-header img { width: 50px; height: 50px; border-radius: 10px; }
        .card-title-sec { flex-grow: 1; }
        .card-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; }
        .card-price { color: var(--neon-green); font-weight: bold; }

        select {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
            outline: none;
            cursor: pointer;
        }

        select option { background: #1e1b4b; }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn i { font-size: 1.1rem; }
        .btn-download { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-download:hover { background: rgba(255, 255, 255, 0.2); }
        
        .btn-video { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.4); color: #fca5a5;}
        .btn-video:hover { background: rgba(239, 68, 68, 0.4); }

        /* Green Shiny Button */
        .btn-pay {
            background: linear-gradient(45deg, #16a34a, #22c55e);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.4);
        }
        .btn-pay::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.5), transparent);
            transform: skewX(-20deg);
            animation: shine 2.5s infinite;
        }
        .btn-pay:hover { box-shadow: 0 0 20px rgba(34, 197, 94, 0.8); transform: scale(1.02); }

        .canva-note { font-size: 0.8rem; color: #a1a1aa; text-align: center; margin-top: -5px; }

        /* Floating Socials */
        .social-float { position: fixed; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 15px; z-index: 100;}
        .social-float a {
            width: 50px; height: 50px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; color: white; text-decoration: none;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .social-float a.whatsapp { background: #25D366; }
        .social-float a.whatsapp:hover { box-shadow: 0 0 20px #25D366; transform: scale(1.1); }
        .social-float a.telegram { background: #0088cc; }
        .social-float a.telegram:hover { box-shadow: 0 0 20px #0088cc; transform: scale(1.1); }

        /* Video Popup */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            z-index: 999; display: none; justify-content: center; align-items: center;
        }
        .popup-content { width: 80%; max-width: 900px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 0 30px rgba(255,255,255,0.2); }
        .popup-content iframe { width: 100%; height: 100%; border: none; }

        /* Animations */
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        @keyframes pulseText { from { opacity: 0.8; } to { opacity: 1; filter: drop-shadow(0 0 5px rgba(255,138,0,0.5)); } }
        @keyframes floatGlow { from { transform: translateY(0); filter: drop-shadow(0 0 5px rgba(0,243,255,0.4)); } to { transform: translateY(-5px); filter: drop-shadow(0 0 15px rgba(188,19,254,0.8)); } }
    </style>
</head>

    // Helper: Drive link /view se /preview convert karne ke liye (taki iframe me chale)
    function formatDriveLink(url) {
        if(url && url.includes("/view")) {
            return url.replace("/view?pli=1", "/preview").replace("/view", "/preview");
        }
        return url;
    }

    // Grid Render karna
    const grid = document.getElementById("softwareGrid");

    function renderCards() {
        grid.innerHTML = "";
        softwareData.forEach((sw, index) => {
            let card = document.createElement("div");
            card.className = "software-card glass";
            card.setAttribute("data-name", sw.name.toLowerCase());
            
            // Initial version select setup
            let currentVer = sw.versions.length > 0 ? sw.versions[0] : "";
            let displayName = sw.isCanva ? sw.name : `${sw.name} <span id="ver-${index}">${currentVer}</span>`;
            
            let links = sw.isCanva ? sw.links["default"] : sw.links[currentVer];

            // HTML Structure
            let html = `
                <div class="card-header">
                    <img src="${sw.logo}" alt="${sw.name}">
                    <div class="card-title-sec">
                        <div class="card-title">${displayName}</div>
                        <div class="card-price">(Price ₹${sw.price})</div>
                    </div>
                </div>
            `;

            // Agar canva nahi hai toh dropdown dikhao
            if (!sw.isCanva) {
                let options = sw.versions.map(v => `<option value="${v}">${v}</option>`).join("");
                html += `<select id="select-${index}" onchange="updateCard(${index})">${options}</select>`;
            }

            // Buttons
            if (!sw.isCanva) {
                html += `<button class="btn btn-download" id="dl-${index}" onclick="window.open('${links.download}', '_blank')"><i class="fa-solid fa-download"></i> Download</button>`;
            }
            
            // Pay button aur uske niche ka text
            if(sw.isCanva) {
                html += `<button class="btn btn-pay" id="pay-${index}" onclick="window.open('${links.pay}', '_blank')"><i class="fa-solid fa-wallet"></i> Pay</button>
                         <div class="canva-note">Pay kro & WhatsApp ya telegram me screenshot do. (Email Login) Android iOS windows MacOS all device supported</div>`;
            } else {
                html += `<button class="btn btn-pay" id="pay-${index}" onclick="window.open('${links.pay}', '_blank')"><i class="fa-solid fa-wallet"></i> Get Password (Pay)</button>`;
            }

            // Installation video button (Canva ko chhodkar)
            if (!sw.isCanva) {
                html += `<button class="btn btn-video" id="vid-${index}" onclick="openVideo('${formatDriveLink(links.video)}')"><i class="fa-solid fa-circle-play"></i> Installation steps + proof video</button>`;
            }

            card.innerHTML = html;
            grid.appendChild(card);
            
            // Version store karne ke liye custom attributes
            card.setAttribute("data-versions", JSON.stringify(sw.versions));
        });

    // Version change hone pe button links update karne ka function
    window.updateCard = function(index) {
        let sw = softwareData[index];
        let selectedVer = document.getElementById(`select-${index}`).value;
        
        // Update title text
        document.getElementById(`ver-${index}`).innerText = selectedVer;

        // Update Links
        let newLinks = sw.links[selectedVer];
        if(newLinks) {
            document.getElementById(`dl-${index}`).onclick = () => window.open(newLinks.download, '_blank');
            document.getElementById(`pay-${index}`).onclick = () => window.open(newLinks.pay, '_blank');
            document.getElementById(`vid-${index}`).onclick = () => openVideo(formatDriveLink(newLinks.video));
        }
    }

    // Search bar filter logic (Name + Year ke hisab se)
    window.filterSoftware = function() {
        let input = document.getElementById('searchInput').value.toLowerCase();
        let cards = document.getElementsByClassName('software-card');

        for (let i = 0; i < cards.length; i++) {
            let name = cards[i].getAttribute('data-name');
            let versionsStr = cards[i].getAttribute('data-versions');
            let matchFound = name.includes(input);

            // Check if user is typing a year (e.g. "Premiere 2025")
            if(versionsStr) {
                let versions = JSON.parse(versionsStr);
                let parts = input.split(" ");
                let yearTyped = parts.find(p => !isNaN(p) && p.length >= 2);
                
                if (yearTyped) {
                    // check if the software name matches the text part and has that year
                    let textPart = input.replace(yearTyped, "").trim();
                    if (name.includes(textPart) && versions.some(v => v.includes(yearTyped))) {
                        matchFound = true;
                        // Auto select that year in dropdown
                        let selectObj = cards[i].querySelector("select");
                        if(selectObj) {
                            let matchedOption = Array.from(selectObj.options).find(opt => opt.value.includes(yearTyped));
                            if(matchedOption) {
                                selectObj.value = matchedOption.value;
                                // trigger link updates
                                selectObj.onchange(); 
                            }
                        }
                    } else {
                        matchFound = false; // Year doesn't match this software
                    }
                }
            }

            if (matchFound) {
                cards[i].style.display = "flex";
            } else {
                cards[i].style.display = "none";
            }
        }
    }

    // Video Popup Logic
    const popup = document.getElementById('videoPopup');
    const iframe = document.getElementById('videoFrame');
    const popupContent = document.getElementById('popupContent');

            iframe.src = url;
            popup.style.display = "flex";
        } else {

        }

        if (e.target === popup) {
            popup.style.display = "none";
            iframe.src = ""; // Stop video playing in background

    document.onkeydown = function(e) {
        // Block F12
        if(e.keyCode == 123) { return false; }
        // Block Ctrl+Shift+I (Inspect)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { return false; }
        // Block Ctrl+Shift+C (Element select)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { return false; }
        // Block Ctrl+Shift+J (Console)
        if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { return false; }
        // Block Ctrl+U (View Source)
        if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { return false; }
    }

    // Initial render call
    renderCards();
</script>

</body>
</html>
